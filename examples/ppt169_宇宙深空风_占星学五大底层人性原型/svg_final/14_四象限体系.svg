<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c" />
      <stop offset="100%" stop-color="#e8d48b" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#0a0e1a" />
  <text x="60" y="80" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#8a7234" letter-spacing="3">CHAPTER 04</text>
  <text x="60" y="115" font-family="Georgia, 'Microsoft YaHei', 'PingFang SC', serif" font-size="32" font-weight="bold" fill="#e8d48b">四象限体系：人性驱动力的空间分布</text>
  <line x1="60" y1="130" x2="200" y2="130" stroke="#c9a84c" stroke-width="2" opacity="0.6" />
  <text x="60" y="170" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#e8e6e1">四象限将十二宫位分为四个区域，分别对应人类生活的四个核心维度。每个象限代表一组相关的人性驱动力。</text>
  <path fill="#151d35" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4" d="M70,200 H610 A10,10 0 0 1 620,210 V410 A10,10 0 0 1 610,420 H70 A10,10 0 0 1 60,410 V210 A10,10 0 0 1 70,200 Z" />
  <path fill="#c9a84c" d="M62,200 H62 A2,2 0 0 1 64,202 V418 A2,2 0 0 1 62,420 H62 A2,2 0 0 1 60,418 V202 A2,2 0 0 1 62,200 Z" />
  <text x="80" y="235" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#c9a84c">第一象限：个体化 (1-3宫)</text>
  <text x="80" y="265" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">核心人性：<tspan fill="#c9a84c" font-weight="bold">自我认同、生存本能、资源获取</tspan></text>
  <text x="80" y="295" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 第一宫：自我形象、身体、外在表现</text>
  <text x="80" y="320" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 第二宫：物质资源、价值感、所有权</text>
  <text x="80" y="345" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 第三宫：沟通、学习、近亲关系</text>
  <text x="80" y="380" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#6e6e73">对应人性：领域意识 + 损失厌恶</text>
  <path fill="#151d35" stroke="#4a7cf7" stroke-width="1" stroke-opacity="0.4" d="M670,200 H1210 A10,10 0 0 1 1220,210 V410 A10,10 0 0 1 1210,420 H670 A10,10 0 0 1 660,410 V210 A10,10 0 0 1 670,200 Z" />
  <path fill="#4a7cf7" d="M662,200 H662 A2,2 0 0 1 664,202 V418 A2,2 0 0 1 662,420 H662 A2,2 0 0 1 660,418 V202 A2,2 0 0 1 662,200 Z" />
  <text x="680" y="235" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b9bff">第二象限：家庭与根基 (4-6宫)</text>
  <text x="680" y="265" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">核心人性：<tspan fill="#6b9bff" font-weight="bold">安全感、归属感、服务与责任</tspan></text>
  <text x="680" y="295" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 第四宫：家庭、根源、情感基础</text>
  <text x="680" y="320" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 第五宫：创造、表达、恋爱、子女</text>
  <text x="680" y="345" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 第六宫：工作、健康、日常服务</text>
  <text x="680" y="380" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#6e6e73">对应人性：等级服从 + 互惠交换</text>
  <path fill="#151d35" stroke="#7c5cbf" stroke-width="1" stroke-opacity="0.4" d="M70,450 H610 A10,10 0 0 1 620,460 V660 A10,10 0 0 1 610,670 H70 A10,10 0 0 1 60,660 V460 A10,10 0 0 1 70,450 Z" />
  <path fill="#7c5cbf" d="M62,450 H62 A2,2 0 0 1 64,452 V668 A2,2 0 0 1 62,670 H62 A2,2 0 0 1 60,668 V452 A2,2 0 0 1 62,450 Z" />
  <text x="80" y="485" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#a78bfa">第三象限：社会关系 (7-9宫)</text>
  <text x="80" y="515" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">核心人性：<tspan fill="#a78bfa" font-weight="bold">伙伴关系、深层联结、意义追寻</tspan></text>
  <text x="80" y="545" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 第七宫：一对一关系、契约、婚姻</text>
  <text x="80" y="570" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 第八宫：共享资源、转化、深层心理</text>
  <text x="80" y="595" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 第九宫：哲学、信仰、远行、高等教育</text>
  <text x="80" y="630" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#6e6e73">对应人性：部落归属 + 互惠交换</text>
  <path fill="#151d35" stroke="#4caf7d" stroke-width="1" stroke-opacity="0.4" d="M670,450 H1210 A10,10 0 0 1 1220,460 V660 A10,10 0 0 1 1210,670 H670 A10,10 0 0 1 660,660 V460 A10,10 0 0 1 670,450 Z" />
  <path fill="#4caf7d" d="M662,450 H662 A2,2 0 0 1 664,452 V668 A2,2 0 0 1 662,670 H662 A2,2 0 0 1 660,668 V452 A2,2 0 0 1 662,450 Z" />
  <text x="680" y="485" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#4caf7d">第四象限：集体与社会 (10-12宫)</text>
  <text x="680" y="515" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">核心人性：<tspan fill="#4caf7d" font-weight="bold">社会地位、集体认同、潜意识整合</tspan></text>
  <text x="680" y="545" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 第十宫：社会地位、事业、公共形象</text>
  <text x="680" y="570" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 第十一宫：社群、理想、群体归属</text>
  <text x="680" y="595" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 第十二宫：潜意识、隐秘、灵性、终结</text>
  <text x="680" y="630" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#6e6e73">对应人性：等级服从 + 部落归属</text>
  <text x="1220" y="690" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#6e6e73">14 / 18</text>
</svg>