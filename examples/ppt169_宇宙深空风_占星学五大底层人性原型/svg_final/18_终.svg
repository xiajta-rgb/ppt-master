  <text x="640" y="280" text-anchor="middle" font-family="Georgia, 'Microsoft YaHei', 'PingFang SC', serif" font-size="56" font-weight="bold" fill="url(#titleGrad)">感谢阅读</text>
  
  <line x1="540" y1="300" x2="740" y2="300" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>

  <text x="640" y="350" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#e8d48b" font-style="italic">"As Above, So Below"</text>
  
  <text x="640" y="400" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" fill="#9a98a0">西方占星学五大底层人性原型体系报告</text>

