      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#e8d48b"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <radialGradient id="bgDecor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#0a0e1a"/>
  <rect width="1280" height="720" fill="url(#bgDecor)"/>

  <!-- Decorative circles -->
