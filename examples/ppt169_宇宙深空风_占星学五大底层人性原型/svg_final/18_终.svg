  <circle cx="640" cy="320" r="150" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.12"/>
  <circle cx="640" cy="320" r="120" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.1"/>
  <circle cx="640" cy="320" r="90" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.08"/>

