  <circle cx="1080" cy="180" r="1.5" fill="#c9a84c" opacity="0.3"/>
  <circle cx="300" cy="550" r="1.5" fill="#4a7cf7" opacity="0.3"/>
  <circle cx="980" cy="520" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="150" cy="350" r="1" fill="#c9a84c" opacity="0.3"/>
  <circle cx="1130" cy="400" r="1.5" fill="#4a7cf7" opacity="0.25"/>

