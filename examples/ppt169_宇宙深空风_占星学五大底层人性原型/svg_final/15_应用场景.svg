<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c" />
      <stop offset="100%" stop-color="#e8d48b" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#0a0e1a" />
  <text x="60" y="80" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#8a7234" letter-spacing="3">CHAPTER 05</text>
  <text x="60" y="115" font-family="Georgia, 'Microsoft YaHei', 'PingFang SC', serif" font-size="32" font-weight="bold" fill="#e8d48b">应用场景：五大人性原型的实践价值</text>
  <line x1="60" y1="130" x2="200" y2="130" stroke="#c9a84c" stroke-width="2" opacity="0.6" />
  <text x="60" y="170" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#e8e6e1">五大底层人性原型体系不仅是一套理论框架，更具有广泛的实践应用价值。以下是四个核心应用场景：</text>
  <path fill="#151d35" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.3" d="M70,200 H610 A10,10 0 0 1 620,210 V410 A10,10 0 0 1 610,420 H70 A10,10 0 0 1 60,410 V210 A10,10 0 0 1 70,200 Z" />
  
  <g transform="translate(80.0, 220.0) scale(1.6666666666666667)" fill="#c9a84c">
    <path d="M12 2a5 5 0 1 1 -5 5l.005 -.217a5 5 0 0 1 4.995 -4.783z" />
    <path d="M14 14a5 5 0 0 1 5 5v1a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-1a5 5 0 0 1 5 -5h4z" />
  </g>
  <text x="135" y="250" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#c9a84c">个人发展</text>
  <text x="80" y="285" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">通过星盘分析，识别个人的核心人性驱力模式：</text>
  <text x="80" y="315" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 了解自己的领域意识强弱</text>
  <text x="80" y="340" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 识别损失厌恶的触发点</text>
  <text x="80" y="365" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 理解等级服从的心理根源</text>
  <text x="80" y="390" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 发现部落归属的深层需求</text>
  <path fill="#151d35" stroke="#4a7cf7" stroke-width="1" stroke-opacity="0.3" d="M670,200 H1210 A10,10 0 0 1 1220,210 V410 A10,10 0 0 1 1210,420 H670 A10,10 0 0 1 660,410 V210 A10,10 0 0 1 670,200 Z" />
  
  <g transform="translate(680.0, 220.0) scale(1.6666666666666667)" fill="#6b9bff">
    <path d="M6.979 3.074a6 6 0 0 1 4.988 1.425l.037 .033l.034 -.03a6 6 0 0 1 4.733 -1.44l.246 .036a6 6 0 0 1 3.364 10.008l-.18 .185l-.048 .041l-7.45 7.379a1 1 0 0 1 -1.313 .082l-.094 -.082l-7.493 -7.422a6 6 0 0 1 3.176 -10.215z" />
  </g>
  <text x="735" y="250" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#6b9bff">关系咨询</text>
  <text x="680" y="285" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">通过比较星盘，理解关系中的互动模式：</text>
  <text x="680" y="315" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 识别双方的互惠交换模式</text>
  <text x="680" y="340" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 理解部落归属的兼容性</text>
  <text x="680" y="365" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 分析相位带来的关系张力</text>
  <text x="680" y="390" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 预测飞宫带来的能量流动</text>
  <path fill="#151d35" stroke="#4caf7d" stroke-width="1" stroke-opacity="0.3" d="M70,450 H610 A10,10 0 0 1 620,460 V660 A10,10 0 0 1 610,670 H70 A10,10 0 0 1 60,660 V460 A10,10 0 0 1 70,450 Z" />
  
  <g transform="translate(80.0, 470.0) scale(1.6666666666666667)" fill="#4caf7d">
    <path d="M22 13.478v4.522a3 3 0 0 1 -3 3h-14a3 3 0 0 1 -3 -3v-4.522l.553 .277a20.999 20.999 0 0 0 18.897 -.002l.55 -.275zm-8 -11.478a3 3 0 0 1 3 3v1h2a3 3 0 0 1 3 3v2.242l-1.447 .724a19.002 19.002 0 0 1 -16.726 .186l-.647 -.32l-1.18 -.59v-2.242a3 3 0 0 1 3 -3h2v-1a3 3 0 0 1 3 -3h4zm-2 8a1 1 0 0 0 -1 1a1 1 0 1 0 2 .01c0 -.562 -.448 -1.01 -1 -1.01zm2 -6h-4a1 1 0 0 0 -1 1v1h6v-1a1 1 0 0 0 -1 -1z" />
  </g>
  <text x="135" y="500" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#4caf7d">职业规划</text>
  <text x="80" y="535" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">通过第十宫和第二宫分析，找到适合的职业方向：</text>
  <text x="80" y="565" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 识别社会地位需求模式</text>
  <text x="80" y="590" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 理解物质价值观念</text>
  <text x="80" y="615" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 发现天赋才能（三分相）</text>
  <path fill="#151d35" stroke="#7c5cbf" stroke-width="1" stroke-opacity="0.3" d="M670,450 H1210 A10,10 0 0 1 1220,460 V660 A10,10 0 0 1 1210,670 H670 A10,10 0 0 1 660,660 V460 A10,10 0 0 1 670,450 Z" />
  <use data-icon="tabler-filled/users-group" x="680" y="470" width="40" height="40" fill="#a78bfa" />
  <text x="735" y="500" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#a78bfa">团队建设</text>
  <text x="680" y="535" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">通过团队星盘合成，优化团队协作：</text>
  <text x="680" y="565" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 识别团队的集体人性模式</text>
  <text x="680" y="590" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 理解团队内的等级结构</text>
  <text x="680" y="615" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">• 优化互惠交换机制</text>
  <text x="1220" y="690" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#6e6e73">15 / 18</text>
</svg>