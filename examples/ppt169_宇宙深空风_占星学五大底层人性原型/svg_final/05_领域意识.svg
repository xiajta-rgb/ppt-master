  <text x="250" y="440" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">第二宫</text>
  <rect x="440" y="415" width="780" height="40" fill="#151d35" />
  <text x="830" y="440" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">领域意识的落地场景（物质所有权）</text>

  <rect x="60" y="455" width="380" height="40" />
