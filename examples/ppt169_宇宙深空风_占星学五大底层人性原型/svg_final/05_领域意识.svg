  <text x="120" y="195" font-family="Georgia, 'Microsoft YaHei', 'PingFang SC', serif" font-size="24" font-weight="bold" fill="#c9a84c">对应星体：土星（Saturn）♄</text>
  <text x="120" y="225" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#e8e6e1">土星代表结构、边界、规则与时间。它是人性中「领域意识」的化身——知道什么是我的、什么不是我的，知道边界在哪里。</text>

  
  <text x="60" y="280" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#e8d48b">占星要素与人性对照</text>

  
  <path fill="#1a2440" d="M64,295 H436 A4,4 0 0 1 440,299 V331 A4,4 0 0 1 436,335 H64 A4,4 0 0 1 60,331 V299 A4,4 0 0 1 64,295 Z" />
