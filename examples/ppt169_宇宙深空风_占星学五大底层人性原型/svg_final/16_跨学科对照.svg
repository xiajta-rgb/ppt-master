  <rect width="1280" height="720" fill="#0a0e1a" />
  <text x="60" y="80" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#8a7234" letter-spacing="3">CHAPTER 06</text>
  <text x="60" y="115" font-family="Georgia, 'Microsoft YaHei', 'PingFang SC', serif" font-size="32" font-weight="bold" fill="#e8d48b">跨学科对照：占星学与现代科学的对话</text>
