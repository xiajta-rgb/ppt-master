  <text x="245" y="395" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#6b9bff" font-weight="bold">等级服从 (月亮)</text>
  <text x="245" y="420" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#9a98a0">安全需求</text>
