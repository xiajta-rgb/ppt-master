  <text x="1010" y="210" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#e8d48b">对应关系</text>
  <rect x="60" y="225" width="370" height="70" fill="#151d35" />
  <text x="245" y="255" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#c9a84c" font-weight="bold">领域意识 (土星)</text>
