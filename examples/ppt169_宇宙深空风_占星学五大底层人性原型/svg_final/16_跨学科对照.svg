  <text x="60" y="165" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#e8e6e1">五大底层人性原型体系与多个现代学科存在深刻的对应关系，以下是三组核心对照：</text>
  <path fill="#1a2440" d="M64,185 H426 A4,4 0 0 1 430,189 V221 A4,4 0 0 1 426,225 H64 A4,4 0 0 1 60,221 V189 A4,4 0 0 1 64,185 Z" />
  <text x="245" y="210" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#e8d48b">占星学概念</text>
  <path fill="#1a2440" d="M434,185 H796 A4,4 0 0 1 800,189 V221 A4,4 0 0 1 796,225 H434 A4,4 0 0 1 430,221 V189 A4,4 0 0 1 434,185 Z" />
