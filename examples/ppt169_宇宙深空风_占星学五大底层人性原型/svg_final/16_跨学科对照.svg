  <rect x="430" y="295" width="370" height="70" />
  <text x="615" y="325" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">损失厌恶 (Loss Aversion)</text>
  <text x="615" y="350" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#9a98a0">卡尼曼前景理论</text>
  <rect x="800" y="295" width="420" height="70" />
  <text x="1010" y="325" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">人类对损失的敏感度是收益的2倍</text>
