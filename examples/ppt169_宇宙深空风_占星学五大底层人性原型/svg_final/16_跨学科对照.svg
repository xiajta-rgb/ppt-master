  <text x="1010" y="280" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#9a98a0">与土星的边界设定功能完全对应</text>
  <rect x="60" y="295" width="370" height="70" />
  <text x="245" y="325" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e05555" font-weight="bold">损失厌恶 (火星)</text>
