  <text x="90" y="625" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">💡 <tspan fill="#6b9bff" font-weight="bold">核心洞察：</tspan>占星学的符号体系与进化心理学的研究发现高度吻合，这表明占星学可能是一套古老的人类行为观察系统，</text>
  <text x="90" y="650" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">   用象征性语言记录了人类在进化过程中形成的核心心理机制。</text>
