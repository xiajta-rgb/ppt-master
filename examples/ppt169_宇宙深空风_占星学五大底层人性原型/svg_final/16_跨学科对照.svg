  <text x="245" y="465" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#a78bfa" font-weight="bold">部落归属 (冥王星)</text>
  <text x="245" y="490" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#9a98a0">深层认同</text>
  <rect x="430" y="435" width="370" height="70" />
  <text x="615" y="465" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">社会认同理论</text>
  <text x="615" y="490" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#9a98a0">内群体偏好</text>
  <rect x="800" y="435" width="420" height="70" />
  <text x="1010" y="465" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">人类强烈倾向于认同特定社会群体</text>
  <text x="1010" y="490" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#9a98a0">与冥王星的部落忠诚完全对应</text>
  <rect x="60" y="505" width="370" height="70" fill="#151d35" />
  <text x="245" y="535" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#4caf7d" font-weight="bold">互惠交换 (太阳)</text>
  <text x="245" y="560" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#9a98a0">价值互换</text>
  <rect x="430" y="505" width="370" height="70" fill="#151d35" />
  <text x="615" y="535" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">互惠利他主义</text>
  <text x="615" y="560" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#9a98a0">特里弗斯理论</text>
  <rect x="800" y="505" width="420" height="70" fill="#151d35" />
  <text x="1010" y="535" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">人类合作的基础是互惠原则</text>
  <text x="1010" y="560" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#9a98a0">与太阳的自我价值交换完全对应</text>
