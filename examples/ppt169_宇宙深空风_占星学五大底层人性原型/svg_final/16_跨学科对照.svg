  <text x="615" y="420" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#9a98a0">支配-服从连续体</text>
  <rect x="800" y="365" width="420" height="70" fill="#151d35" />
  <text x="1010" y="395" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">人类天生具有识别社会等级的能力</text>
  <text x="1010" y="420" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#9a98a0">与月亮的安全需求完全对应</text>
