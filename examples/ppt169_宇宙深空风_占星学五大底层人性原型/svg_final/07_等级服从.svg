  <text x="830" y="480" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">等级服从的落地场景（社会等级）</text>

  
  <path fill="#151d35" stroke="#4a7cf7" stroke-width="1" stroke-opacity="0.3" d="M70,520 H1210 A10,10 0 0 1 1220,530 V610 A10,10 0 0 1 1210,620 H70 A10,10 0 0 1 60,610 V530 A10,10 0 0 1 70,520 Z" />
  <path fill="#4a7cf7" d="M62,520 H62 A2,2 0 0 1 64,522 V618 A2,2 0 0 1 62,620 H62 A2,2 0 0 1 60,618 V522 A2,2 0 0 1 62,520 Z" />
  <text x="90" y="550" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="bold" fill="#6b9bff">进化心理学对照：</text>
  <text x="90" y="575" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">等级服从是人类作为群居动物的核心适应器。在原始部落中，识别并服从等级秩序是获得资源、避免冲突、确保生存的关键策略。</text>
  <text x="90" y="600" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">月亮在占星学中代表的"安全感"，本质上是对等级位置的确认。</text>

  
  <text x="1220" y="690" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#6e6e73">07 / 18</text>
