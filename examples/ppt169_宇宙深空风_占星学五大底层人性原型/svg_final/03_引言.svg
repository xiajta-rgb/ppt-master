  <text x="60" y="80" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#8a7234" letter-spacing="3">INTRODUCTION</text>
  <text x="60" y="115" font-family="Georgia, 'Microsoft YaHei', 'PingFang SC', serif" font-size="32" font-weight="bold" fill="#e8d48b">引言：占星学作为人性演化心理学的象征语言</text>

  
  <path fill="#151d35" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.3" d="M70,145 H1210 A10,10 0 0 1 1220,155 V195 A10,10 0 0 1 1210,205 H70 A10,10 0 0 1 60,195 V155 A10,10 0 0 1 70,145 Z" />
  <text x="640" y="172" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="bold" fill="#e8d48b">核心公理：「As above, so below」— 在上如是，在下亦然</text>
  <text x="640" y="195" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">西方占星学本质是一套用 <tspan fill="#c9a84c" font-weight="bold">神话—象征语言</tspan> 编码的 <tspan fill="#c9a84c" font-weight="bold">先天人性结构图谱</tspan>，将人类数百万年演化形成的底层本能，拆解为四大模块。</text>

  
  
