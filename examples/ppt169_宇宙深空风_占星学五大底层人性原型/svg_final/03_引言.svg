  <path fill="#151d35" stroke="#4a7cf7" stroke-width="1" stroke-opacity="0.3" d="M70,440 H1210 A10,10 0 0 1 1220,450 V570 A10,10 0 0 1 1210,580 H70 A10,10 0 0 1 60,570 V450 A10,10 0 0 1 70,440 Z" />
  <path fill="#4a7cf7" d="M62,440 H62 A2,2 0 0 1 64,442 V578 A2,2 0 0 1 62,580 H62 A2,2 0 0 1 60,578 V442 A2,2 0 0 1 62,440 Z" />
  <text x="90" y="475" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b9bff">核心论点：</text>
  <text x="90" y="505" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#e8e6e1">西方占星学的完整体系，就是一套用神话—象征语言编码的人性演化心理学模型。</text>
  <text x="90" y="535" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#e8e6e1">现代心理学是 <tspan fill="#c9a84c" font-weight="bold">「归纳式」</tspan> 的（从行为反推人性），而占星学是 <tspan fill="#c9a84c" font-weight="bold">「演绎式」</tspan> 的</text>
  <text x="90" y="560" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#e8e6e1">（从宇宙秩序直接映射先天人性结构），二者最终指向同一套刻在人类基因里的底层生存本能。</text>

  
  <text x="1220" y="690" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#6e6e73">03 / 18</text>
