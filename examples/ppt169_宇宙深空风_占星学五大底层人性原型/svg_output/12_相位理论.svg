  <text x="615" y="667" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#e8e6e1">和谐、机会</text>
  <rect x="800" y="645" width="420" height="35"/>
  <text x="1010" y="667" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#e8e6e1">两种驱力协作，产生协同效应</text>
