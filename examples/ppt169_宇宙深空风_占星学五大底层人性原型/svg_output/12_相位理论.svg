  <text x="1120" y="385" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#6e6e73">能量对立但互补</text>
  <text x="1120" y="410" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#a78bfa">人性：两极拉扯</text>
