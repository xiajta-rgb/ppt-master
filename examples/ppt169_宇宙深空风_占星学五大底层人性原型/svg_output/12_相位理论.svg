  <rect width="1280" height="720" fill="#0a0e1a"/>
  <text x="60" y="80" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#8a7234" letter-spacing="3">CHAPTER 03</text>
  <text x="60" y="115" font-family="Georgia, 'Microsoft YaHei', 'PingFang SC', serif" font-size="32" font-weight="bold" fill="#e8d48b">相位理论：星体间的互动模式</text>
  <line x1="60" y1="130" x2="200" y2="130" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>
  <text x="60" y="170" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#e8e6e1">相位（Aspects）描述了两颗或多颗星体之间的角度关系，反映了不同本能驱力之间的互动模式。每种相位对应不同的人性互动方式。</text>
  <text x="60" y="210" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#e8d48b">五种核心相位</text>
  <rect x="60" y="230" width="220" height="200" rx="10" fill="#151d35" stroke="#4caf7d" stroke-width="1" stroke-opacity="0.4"/>
