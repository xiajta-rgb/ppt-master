  <text x="170" y="275" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="28" font-weight="bold" fill="#4caf7d">0°</text>
  <text x="170" y="310" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#e8d48b">合相</text>
  <text x="170" y="340" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#9a98a0">能量融合</text>
  <text x="170" y="365" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#6e6e73">两颗星体在同一位置，</text>
  <text x="170" y="385" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#6e6e73">能量完全融合</text>
  <text x="170" y="410" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#4caf7d">人性：驱力合一</text>
  <rect x="300" y="230" width="220" height="200" rx="10" fill="#151d35" stroke="#4ac9c9" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="300" y="230" width="4" height="200" rx="2" fill="#4ac9c9"/>
  <text x="410" y="275" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="28" font-weight="bold" fill="#4ac9c9">60°</text>
