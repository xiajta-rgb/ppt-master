  <text x="640" y="490" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">📌 <tspan fill="#c9a84c" font-weight="bold">相位本质：</tspan>不同本能驱力之间的角度关系，反映了人性中各种驱力的协作、冲突、融合或对立模式。</text>
  <text x="60" y="550" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#e8d48b">相位与人性互动模式</text>
