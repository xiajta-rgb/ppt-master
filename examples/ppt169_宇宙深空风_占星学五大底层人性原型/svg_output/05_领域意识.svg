<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e8d48b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#0a0e1a"/>

  <!-- Header -->
  <text x="60" y="80" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#8a7234" letter-spacing="3">1.1 静态映射</text>
  <text x="60" y="115" font-family="Georgia, 'Microsoft YaHei', 'PingFang SC', serif" font-size="32" font-weight="bold" fill="#e8d48b">领域意识：所有权与边界的底层原型</text>
  <line x1="60" y1="130" x2="200" y2="130" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>

  <!-- Saturn icon and title -->
  <use data-icon="tabler-filled/shield" x="60" y="160" width="48" height="48" fill="#c9a84c"/>
  <text x="120" y="195" font-family="Georgia, 'Microsoft YaHei', 'PingFang SC', serif" font-size="24" font-weight="bold" fill="#c9a84c">对应星体：土星（Saturn）♄</text>
  <text x="120" y="225" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#e8e6e1">土星代表结构、边界、规则与时间。它是人性中「领域意识」的化身——知道什么是我的、什么不是我的，知道边界在哪里。</text>

  <!-- Mapping table -->
  <text x="60" y="280" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#e8d48b">占星要素与人性对照</text>

  <!-- Table header -->
  <rect x="60" y="295" width="380" height="40" rx="4" fill="#1a2440"/>
  <text x="250" y="320" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#e8d48b">占星要素</text>
  <rect x="440" y="295" width="780" height="40" rx="4" fill="#1a2440"/>
  <text x="830" y="320" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#e8d48b">对应人性</text>

  <!-- Table rows -->
  <rect x="60" y="335" width="380" height="40" fill="#151d35"/>
  <text x="250" y="360" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">土星</text>
  <rect x="440" y="335" width="780" height="40" fill="#151d35"/>
  <text x="830" y="360" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">领域意识的核心驱力</text>

  <rect x="60" y="375" width="380" height="40"/>
  <text x="250" y="400" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">摩羯座</text>
  <rect x="440" y="375" width="780" height="40"/>
  <text x="830" y="400" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">领域意识的表达模式（结构化、层级化）</text>

  <rect x="60" y="415" width="380" height="40" fill="#151d35"/>
  <text x="250" y="440" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">第二宫</text>
  <rect x="440" y="415" width="780" height="40" fill="#151d35"/>
  <text x="830" y="440" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">领域意识的落地场景（物质所有权）</text>

  <rect x="60" y="455" width="380" height="40"/>
  <text x="250" y="480" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">第四宫</text>
  <rect x="440" y="455" width="780" height="40"/>
  <text x="830" y="480" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">领域意识的落地场景（家庭/领土）</text>

  <rect x="60" y="495" width="380" height="40" fill="#151d35"/>
  <text x="250" y="520" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">第十宫</text>
  <rect x="440" y="495" width="780" height="40" fill="#151d35"/>
  <text x="830" y="520" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#e8e6e1">领域意识的落地场景（社会地位/公共领域）</text>

  <!-- Evolutionary psychology box -->
  <rect x="60" y="560" width="1160" height="100" rx="10" fill="#151d35" stroke="#4a7cf7" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="60" y="560" width="4" height="100" rx="2" fill="#4a7cf7"/>
  <text x="90" y="590" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="bold" fill="#6b9bff">进化心理学对照：</text>
  <text x="90" y="615" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">领域意识是灵长类动物的核心本能之一。划定领地、保护资源、建立边界——这是所有社会性动物生存的基础。</text>
  <text x="90" y="640" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#e8e6e1">土星在占星学中的"限制"与"考验"，本质上是对领域边界的测试与强化。</text>

  <!-- Page number -->
  <text x="1220" y="690" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#6e6e73">05 / 18</text>
</svg>
