<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 40)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">CHAPTER 02</text>
  </g>
  <text x="60" y="85" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="32" font-weight="700">市场核心数据</text>
  <rect x="60" y="100" width="80" height="3" fill="url(#accentGradient)"/>
  <text x="60" y="125" fill="#86868b" font-family="Inter, sans-serif" font-size="13">解析市场发展趋势与品牌格局</text>

  <g transform="translate(60, 155)">
    <rect x="0" y="0" width="1160" height="540" rx="8" fill="#1a1a20" stroke="#2a2a35"/>

    <g transform="translate(60, 40)">
      <rect x="0" y="0" width="480" height="220" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <text x="30" y="50" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="36" font-weight="700">6.7<tspan font-size="18">%</tspan></text>
      <text x="30" y="90" fill="#86868b" font-family="Inter, sans-serif" font-size="14">年复合增长率</text>
      <text x="30" y="115" fill="#6e6e73" font-family="Inter, sans-serif" font-size="12">2018-2023中国市场</text>
      <rect x="30" y="130" width="420" height="70" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="240" y="172" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="12">[ 增长图 3:4 ]</text>
    </g>

    <g transform="translate(580, 40)">
      <rect x="0" y="0" width="480" height="220" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <text x="30" y="50" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="36" font-weight="700">1560<tspan font-size="18">亿</tspan></text>
      <text x="30" y="90" fill="#86868b" font-family="Inter, sans-serif" font-size="14">市场总规模(2023)</text>
      <text x="30" y="115" fill="#6e6e73" font-family="Inter, sans-serif" font-size="12">工作服/特殊工装/休闲工装</text>
      <rect x="30" y="130" width="420" height="70" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="240" y="172" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="12">[ 规模图 3:4 ]</text>
    </g>

    <g transform="translate(60, 290)">
      <rect x="0" y="0" width="480" height="220" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <text x="30" y="50" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="36" font-weight="700">3.8<tspan font-size="18">%</tspan></text>
      <text x="30" y="90" fill="#86868b" font-family="Inter, sans-serif" font-size="14">传统品牌年增长率</text>
      <text x="30" y="115" fill="#6e6e73" font-family="Inter, sans-serif" font-size="12">深耕工作/防护服领域</text>
      <rect x="30" y="130" width="420" height="70" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="240" y="172" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="12">[ 传统品牌 3:4 ]</text>
    </g>

    <g transform="translate(580, 290)">
      <rect x="0" y="0" width="480" height="220" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <text x="30" y="50" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="36" font-weight="700">12.4<tspan font-size="18">%</tspan></text>
      <text x="30" y="90" fill="#86868b" font-family="Inter, sans-serif" font-size="14">新兴品牌年增长率</text>
      <text x="30" y="115" fill="#6e6e73" font-family="Inter, sans-serif" font-size="12">创新设计+社媒营销突围</text>
      <rect x="30" y="130" width="420" height="70" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="240" y="172" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="12">[ 新兴品牌 3:4 ]</text>
    </g>
  </g>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>
