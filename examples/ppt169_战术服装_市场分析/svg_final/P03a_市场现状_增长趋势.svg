<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 40)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">CHAPTER 01</text>
  </g>
  <text x="60" y="85" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="32" font-weight="700">市场核心现状</text>
  <rect x="60" y="100" width="80" height="3" fill="url(#accentGradient)"/>
  <text x="60" y="125" fill="#86868b" font-family="Inter, sans-serif" font-size="13">从文化定义到市场格局，全面把握工装风格的核心价值与发展方向</text>

  <g transform="translate(60, 155)">
    <rect x="0" y="0" width="1160" height="540" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
    <rect x="0" y="0" width="1160" height="6" fill="#c9a962"/>
    <svg x="60" y="40" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c9a962" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
      <polyline points="16 7 22 7 22 13"/>
    </svg>
    <text x="100" y="62" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="18" font-weight="700">市场核心现状</text>

    <text x="60" y="100" fill="#86868b" font-family="Inter, sans-serif" font-size="14">工装风格社媒热度持续飙升，全面影响</text>
    <text x="60" y="135" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="16" font-weight="600">服装制造至零售全链条</text>
    <text x="60" y="165" fill="#86868b" font-family="Inter, sans-serif" font-size="14">重塑时尚设计语言与消费者穿着理念</text>
    <text x="60" y="200" fill="#c9a962" font-family="Inter, sans-serif" font-size="16" font-weight="600">行业发展潜力极大</text>

    <rect x="60" y="220" width="1040" height="300" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
    <text x="580" y="385" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 市场增长趋势图 - 3:4竖版 ]</text>
  </g>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>
