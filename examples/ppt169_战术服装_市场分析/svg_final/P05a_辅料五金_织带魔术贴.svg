      <text x="20" y="80" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="700">$0.2-1/meter</text>
      <rect x="20" y="95" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="142" y="195" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">尼龙织带</text>
      <rect x="275" y="95" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="397" y="195" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">聚酯织带</text>
      <rect x="20" y="285" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="142" y="385" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">PP织带</text>
      <rect x="275" y="285" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="397" y="385" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">反光织带</text>
      <text x="280" y="505" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="10">245×180 4:3</text>
    </g>

    <g transform="translate(600, 0)">
      <rect x="0" y="0" width="560" height="530" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="560" height="6" fill="#c9a962"/>
      <text x="20" y="35" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="600">魔术贴</text>
      <text x="20" y="60" fill="#86868b" font-family="Inter, sans-serif" font-size="12">3M Scotchcal | 尼龙</text>
      <text x="20" y="80" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="700">$0.3-2/pcs</text>
      <rect x="20" y="95" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="142" y="195" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">3M工业魔术贴</text>
      <rect x="275" y="95" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="397" y="195" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">射出钩</text>
      <rect x="20" y="285" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="142" y="385" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">蘑菇头</text>
