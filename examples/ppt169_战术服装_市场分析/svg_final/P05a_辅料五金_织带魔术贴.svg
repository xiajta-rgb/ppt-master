      <text x="397" y="385" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">不织布</text>
      <text x="280" y="505" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="10">245×180 4:3</text>
