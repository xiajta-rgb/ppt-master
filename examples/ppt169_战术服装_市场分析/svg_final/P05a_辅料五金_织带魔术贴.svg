<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 40)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">CHAPTER 03</text>
  </g>
  <text x="60" y="85" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="32" font-weight="700">辅料与五金体系</text>
  <rect x="60" y="100" width="80" height="3" fill="url(#accentGradient)"/>
  <text x="60" y="125" fill="#86868b" font-family="Inter, sans-serif" font-size="13">织带、魔术贴——战术服装功能性与耐用性的关键支撑</text>

  <g transform="translate(60, 155)">
    <text x="0" y="0" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">织带与魔术贴行业标杆</text>

    <g transform="translate(0, 25)">
      <rect x="0" y="0" width="560" height="520" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="560" height="6" fill="#c9a962"/>
      <text x="20" y="35" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="600">织带</text>
      <text x="20" y="60" fill="#86868b" font-family="Inter, sans-serif" font-size="12">YKK（织带）</text>
      <text x="20" y="80" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">尼龙/聚酯，军规级抗拉</text>
      <text x="20" y="105" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="20" font-weight="700">$0.2-1/meter</text>
      <rect x="20" y="120" width="520" height="380" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="280" y="320" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 军规织带产品图 3:4竖版 ]</text>
    </g>

    <g transform="translate(580, 25)">
      <rect x="0" y="0" width="560" height="520" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="560" height="6" fill="#c9a962"/>
      <text x="20" y="35" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="600">魔术贴</text>
      <text x="20" y="60" fill="#86868b" font-family="Inter, sans-serif" font-size="12">3M Scotchcal</text>
      <text x="20" y="80" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">尼龙</text>
      <text x="20" y="105" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="20" font-weight="700">$0.3-2/pcs</text>
      <rect x="20" y="120" width="520" height="380" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="280" y="320" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 3M魔术贴产品图 3:4竖版 ]</text>
    </g>
