      <text x="20" y="78" fill="#6e6e73" font-family="Inter, sans-serif" font-size="10">设计语言：最低调务实，无logo外露</text>
      <rect x="20" y="92" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="142" y="192" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">黑色战术夹克</text>
      <rect x="275" y="92" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="397" y="192" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">卡其色工装裤</text>
      <rect x="20" y="282" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="142" y="382" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">OD绿背心</text>
      <rect x="275" y="282" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="397" y="382" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">Coyote背包</text>
      <text x="280" y="500" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="10">245×180 4:3</text>
    </g>

    <g transform="translate(600, 0)">
      <rect x="0" y="0" width="560" height="530" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="560" height="6" fill="#c9a962"/>
      <text x="20" y="35" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="600">户外工装</text>
      <text x="20" y="60" fill="#86868b" font-family="Inter, sans-serif" font-size="11">主色调：棕色、Dark Navy | 辅色调：Hamilton Brown、Lily绿</text>
      <text x="20" y="78" fill="#6e6e73" font-family="Inter, sans-serif" font-size="10">设计语言：都市街头化，鲜艳色调 + 做旧</text>
      <rect x="20" y="92" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="142" y="192" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">棕色工装外套</text>
      <rect x="275" y="92" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="397" y="192" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">Dark Navy工装裤</text>
      <rect x="20" y="282" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="142" y="382" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">Hamilton工装背心</text>
      <rect x="275" y="282" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="397" y="382" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">Lily绿户外帽</text>
      <text x="280" y="500" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="10">245×180 4:3</text>
    </g>
