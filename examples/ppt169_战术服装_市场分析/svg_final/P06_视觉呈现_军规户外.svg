<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 40)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">CHAPTER 04</text>
  </g>
  <text x="60" y="85" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="32" font-weight="700">产品视觉呈现</text>
  <rect x="60" y="100" width="80" height="3" fill="url(#accentGradient)"/>
  <text x="60" y="125" fill="#86868b" font-family="Inter, sans-serif" font-size="13">在亚马逊电商语境下，视觉呈现即产品力</text>

  <text x="60" y="165" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">色彩体系与品牌调性</text>

  <g transform="translate(60, 190)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="540" height="510" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="540" height="6" fill="#c9a962"/>
      <text x="20" y="35" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="600">顶级军规 Tactical</text>
      <text x="20" y="60" fill="#86868b" font-family="Inter, sans-serif" font-size="12">主色调：黑色、卡其色、OD绿 | 辅色调：Coyote Brown、沙色</text>
      <text x="20" y="80" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">设计语言：最低调务实，无logo外露</text>
      <rect x="20" y="95" width="500" height="400" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="270" y="305" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 顶级军规产品图 3:4竖版 ]</text>
    </g>

    <g transform="translate(560, 0)">
      <rect x="0" y="0" width="540" height="510" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="540" height="6" fill="#c9a962"/>
      <text x="20" y="35" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="600">户外工装</text>
      <text x="20" y="60" fill="#86868b" font-family="Inter, sans-serif" font-size="12">主色调：棕色、Dark Navy | 辅色调：Hamilton Brown、Lily绿</text>
      <text x="20" y="80" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">设计语言：都市街头化，鲜艳色调 + 做旧</text>
      <rect x="20" y="95" width="500" height="400" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="270" y="305" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 户外工装产品图 3:4竖版 ]</text>
    </g>
  </g>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>