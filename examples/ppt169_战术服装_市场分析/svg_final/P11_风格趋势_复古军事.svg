<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 40)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">CHAPTER 04</text>
  </g>
  <text x="60" y="85" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="32" font-weight="700">工装风格趋势</text>
  <rect x="60" y="100" width="80" height="3" fill="url(#accentGradient)"/>
  <text x="60" y="125" fill="#86868b" font-family="Inter, sans-serif" font-size="13">四大核心风格定义市场主流方向</text>

  <g transform="translate(60, 155)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="540" height="545" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="540" height="6" fill="#b5a882"/>
      <text x="20" y="35" fill="#b5a882" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">STYLE 01</text>
      <text x="20" y="60" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="15" font-weight="700">复古工装风 Vintage Workwear</text>
      <text x="20" y="85" fill="#86868b" font-family="Inter, sans-serif" font-size="11">复刻上世纪工人服饰，绑定阿美咔叽文化，强调历史感与手工痕迹</text>
      <text x="20" y="110" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="10" font-weight="600">设计元素</text>
      <text x="20" y="128" fill="#86868b" font-family="Inter, sans-serif" font-size="10">丹宁 · 帆布 · 做旧工艺 · 经典版型复刻</text>
      <text x="20" y="150" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="10" font-weight="600">标志单品</text>
      <text x="20" y="168" fill="#86868b" font-family="Inter, sans-serif" font-size="10">底特律夹克、谷仓夹克、伐木裤、工程师靴</text>
      <rect x="20" y="185" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="142" y="285" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">丹宁夹克</text>
      <rect x="275" y="185" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="397" y="285" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">伐木裤</text>
      <rect x="20" y="375" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="142" y="475" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">工程师靴</text>
      <rect x="275" y="375" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="397" y="475" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">帆布工装裙</text>
    </g>

    <g transform="translate(560, 0)">
      <rect x="0" y="0" width="540" height="545" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="540" height="6" fill="#6b7c5e"/>
      <text x="20" y="35" fill="#6b7c5e" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">STYLE 02</text>
      <text x="20" y="60" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="15" font-weight="700">军事工装风 Military Workwear</text>
      <text x="20" y="85" fill="#86868b" font-family="Inter, sans-serif" font-size="11">从军服演变而来，从"战斗装备"转化为潮流符号，注重细节与功能性</text>
      <text x="20" y="110" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="10" font-weight="600">设计元素</text>
      <text x="20" y="128" fill="#86868b" font-family="Inter, sans-serif" font-size="10">迷彩印花 · 战术口袋 · 硬朗剪裁</text>
      <text x="20" y="150" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="10" font-weight="600">标志单品</text>
      <text x="20" y="168" fill="#86868b" font-family="Inter, sans-serif" font-size="10">迷彩工装衬衫、M65野战夹克、MA1飞行夹克</text>
      <rect x="20" y="185" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="142" y="285" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">M65野战夹克</text>
      <rect x="275" y="185" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="397" y="285" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">MA1飞行夹克</text>
      <rect x="20" y="375" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="142" y="475" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">战术工装裤</text>
      <rect x="275" y="375" width="245" height="180" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="397" y="475" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">迷彩背包</text>
    </g>
  </g>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>