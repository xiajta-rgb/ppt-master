<?xml version="1.0" encoding="utf-8"?>
<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <ns0:defs>
    <ns0:linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <ns0:stop offset="0%" stop-color="#0a0a0f" />
      <ns0:stop offset="100%" stop-color="#141419" />
    </ns0:linearGradient>
    <ns0:radialGradient id="heroGlow" cx="50%" cy="-20%" r="80%">
      <ns0:stop offset="0%" stop-color="rgba(201,169,98,0.15)" />
      <ns0:stop offset="100%" stop-color="transparent" />
    </ns0:radialGradient>
    <ns0:linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <ns0:stop offset="0%" stop-color="#c9a962" />
      <ns0:stop offset="100%" stop-color="#e0c882" />
    </ns0:linearGradient>
    <ns0:pattern id="gridPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <ns0:path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    </ns0:pattern>
    <ns0:mask id="gridMask">
      <ns0:ellipse cx="640" cy="200" rx="600" ry="300" fill="white" />
    </ns0:mask>
  </ns0:defs>

  <ns0:rect width="1280" height="720" fill="url(#bgGradient)" />
  <ns0:ellipse cx="640" cy="0" rx="800" ry="500" fill="url(#heroGlow)" />
  <ns0:g mask="url(#gridMask)">
    <ns0:rect width="1280" height="720" fill="url(#gridPattern)" />
  </ns0:g>

  <ns0:g transform="translate(640, 180)">
    <ns0:rect x="-120" y="-18" width="240" height="36" rx="18" fill="rgba(201,169,98,0.1)" stroke="rgba(201,169,98,0.3)" />
    <ns0:text x="0" y="5" text-anchor="middle" fill="#c9a962" font-family="Space Grotesk, Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">INDUSTRY RESEARCH · 2025</ns0:text>
  </ns0:g>

  <ns0:text x="640" y="290" text-anchor="middle" fill="#f5f5f7" font-family="'Space Grotesk', Inter, sans-serif" font-size="44" font-weight="700" letter-spacing="-1">亚马逊美国站</ns0:text>
  <ns0:text x="640" y="360" text-anchor="middle" fill="url(#accentGradient)" font-family="'Space Grotesk', Inter, sans-serif" font-size="44" font-weight="700" letter-spacing="-1">休闲工装战术服装</ns0:text>
  <ns0:text x="640" y="430" text-anchor="middle" fill="#f5f5f7" font-family="'Space Grotesk', Inter, sans-serif" font-size="44" font-weight="700" letter-spacing="-1">市场深度分析</ns0:text>

  <ns0:text x="640" y="500" text-anchor="middle" fill="#86868b" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="400" max-width="600">从市场规模、竞争格局到产品设计DNA——面料科技、版型工学、辅料体系与视觉呈现的全方位专业解读</ns0:text>

  <ns0:g transform="translate(640, 580)" fill="#6e6e73" font-family="Inter, -apple-system, sans-serif" font-size="13">
    <ns0:text x="0" y="0" text-anchor="middle">
      <ns0:tspan dx="-100">2025年4月</ns0:tspan>
      <ns0:tspan dx="60">|</ns0:tspan>
      <ns0:tspan dx="60">Amazon US Market</ns0:tspan>
      <ns0:tspan dx="60">|</ns0:tspan>
      <ns0:tspan dx="60">课程研究报告</ns0:tspan>
    </ns0:text>
  </ns0:g>
</ns0:svg>