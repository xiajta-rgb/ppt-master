<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 40)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">CHAPTER 05</text>
  </g>
  <text x="60" y="85" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="32" font-weight="700">品牌竞争格局</text>
  <rect x="60" y="100" width="80" height="3" fill="url(#accentGradient)"/>
  <text x="60" y="125" fill="#86868b" font-family="Inter, sans-serif" font-size="13">从$25 Dickies到$322 Crye Precision，市场存在清晰的价格阶梯</text>

  <text x="60" y="165" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">价格分层与定位矩阵</text>

  <g transform="translate(60, 190)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="560" height="500" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="560" height="8" fill="#4a9f6a"/>
      <text x="20" y="35" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">$20-40 大众工装</text>
      <text x="20" y="60" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="12">Dickies, Wrangler, Carhartt</text>
      <text x="20" y="80" fill="#86868b" font-family="Inter, sans-serif" font-size="10">性价比、实用性、品牌认知</text>
      <text x="20" y="100" fill="#6e6e73" font-family="Inter, sans-serif" font-size="10">目标：蓝领工人、日常休闲</text>
      <rect x="20" y="115" width="520" height="370" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="280" y="310" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 大众工装产品图 4:3 ]</text>
      <text x="280" y="340" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">520×390</text>
    </g>

    <g transform="translate(600, 0)">
      <rect x="0" y="0" width="560" height="500" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="560" height="8" fill="#c9a962"/>
      <text x="20" y="35" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">$40-80 中端战术</text>
      <text x="20" y="60" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="12">5.11 Tactical, Condor</text>
      <text x="20" y="80" fill="#86868b" font-family="Inter, sans-serif" font-size="10">功能性强、面料可靠、款式多样</text>
      <text x="20" y="100" fill="#6e6e73" font-family="Inter, sans-serif" font-size="10">目标：户外爱好者、执法从业者</text>
      <rect x="20" y="115" width="520" height="370" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="280" y="310" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 中端战术产品图 4:3 ]</text>
      <text x="280" y="340" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">520×390</text>
    </g>
  </g>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>