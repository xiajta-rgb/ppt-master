  <rect x="60" y="100" width="80" height="3" fill="url(#accentGradient)"/>
  <text x="60" y="125" fill="#86868b" font-family="Inter, sans-serif" font-size="13">市场存在清晰的价格阶梯和对应的消费群体</text>

  <text x="60" y="165" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">价格分层与定位矩阵</text>

  <g transform="translate(60, 190)">
    <g transform="translate(0, 0)">
