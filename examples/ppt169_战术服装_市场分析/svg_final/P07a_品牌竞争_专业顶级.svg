      <text x="20" y="80" fill="#86868b" font-family="Inter, sans-serif" font-size="10">顶级面料、精密版型、细节工艺</text>
      <text x="20" y="100" fill="#6e6e73" font-family="Inter, sans-serif" font-size="10">目标：专业用户、城市战术爱好者</text>
      <rect x="20" y="115" width="500" height="380" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="270" y="315" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 专业战术产品图 3:4竖版 ]</text>
    </g>

    <g transform="translate(560, 0)">
      <rect x="0" y="0" width="540" height="510" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="540" height="8" fill="#c9a962"/>
      <text x="20" y="35" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">$150+ 顶级军规</text>
      <text x="20" y="60" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="12">Crye Precision, Arc'teryx LEAF</text>
      <text x="20" y="80" fill="#86868b" font-family="Inter, sans-serif" font-size="10">军事级别耐用性、轻量化</text>
      <text x="20" y="100" fill="#6e6e73" font-family="Inter, sans-serif" font-size="10">目标：特种部队、高端装备玩家</text>
      <rect x="20" y="115" width="500" height="380" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="270" y="315" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 顶级军规产品图 3:4竖版 ]</text>
