<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 60)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="2">CHAPTER 06</text>
  </g>

  <text x="60" y="120" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="36" font-weight="700">未来机遇与战略建议</text>

  <rect x="60" y="140" width="80" height="3" fill="url(#accentGradient)"/>

  <text x="60" y="180" fill="#86868b" font-family="Inter, sans-serif" font-size="14" max-width="1100">基于市场数据、产品分析和趋势洞察，为品牌入局或升级提供可执行的战略方向</text>

  <text x="60" y="230" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="600">战略机遇窗口</text>

  <g transform="translate(60, 260)">
    <rect x="0" y="0" width="360" height="110" rx="6" fill="#1a1a20" stroke="#2a2a35"/>
    <rect x="0" y="0" width="6" height="110" fill="#c9a962"/>
    <text x="25" y="35" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">城市战术渗透</text>
    <text x="25" y="65" fill="#86868b" font-family="Inter, sans-serif" font-size="12">Gorpcore风潮持续扩张，"看起来像战术装备"比"真的是战术装备"有更广阔的市场。城市战术风格溢价空间大。</text>
  </g>

  <g transform="translate(440, 260)">
    <rect x="0" y="0" width="360" height="110" rx="6" fill="#1a1a20" stroke="#2a2a35"/>
    <rect x="0" y="0" width="6" height="110" fill="#c9a962"/>
    <text x="25" y="35" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">可持续升级</text>
    <text x="25" y="65" fill="#86868b" font-family="Inter, sans-serif" font-size="12">40-45%消费者表示环保材料影响购买决策。再生面料、有机棉认证可以成为差异化切入点。</text>
  </g>

  <g transform="translate(820, 260)">
    <rect x="0" y="0" width="360" height="110" rx="6" fill="#1a1a20" stroke="#2a2a35"/>
    <rect x="0" y="0" width="6" height="110" fill="#c9a962"/>
    <text x="25" y="35" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">智能功能融合</text>
    <text x="25" y="65" fill="#86868b" font-family="Inter, sans-serif" font-size="12">抗菌面料、温度调节、智能收纳——科技赋能的面料创新是下一个十年的核心竞争维度。</text>
  </g>

  <text x="60" y="410" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="600">市场进入建议</text>

  <g transform="translate(60, 440)">
    <rect x="0" y="0" width="1160" height="40" rx="4" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="25" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="12"><tspan fill="#c9a962" font-weight="600">1.</tspan> 从中端切入，逐步上探：$45-75价格带是最佳起点，有足够利润空间进行品牌建设。</text>
  </g>

  <g transform="translate(60, 490)">
    <rect x="0" y="0" width="1160" height="40" rx="4" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="25" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="12"><tspan fill="#c9a962" font-weight="600">2.</tspan> "城市战术"是最大增量：45%的城市战术需求增长表明军旅风格已从专业领域渗透到日常消费。</text>
  </g>

  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="1160" height="40" rx="4" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="25" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="12"><tspan fill="#c9a962" font-weight="600">3.</tspan> Gorpcore是结构性转变：Arc'teryx 20亿美元+、Salomon 10亿美元鞋类销售的突破证明了户外功能服装已成为一代人的"制服"。</text>
  </g>

  <g transform="translate(60, 590)">
    <rect x="0" y="0" width="1160" height="40" rx="4" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="25" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="12"><tspan fill="#c9a962" font-weight="600">4.</tspan> 亚马逊是核心战场：线上销售占比超50%，A+内容可提升20%销售额，视觉呈现即产品力。</text>
  </g>

  <g transform="translate(60, 640)">
    <rect x="0" y="0" width="560" height="40" rx="4" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="25" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="12"><tspan fill="#c9a962" font-weight="600">5.</tspan> 功能与时尚融合加速：技术面料不再仅服务于专业场景</text>
  </g>

  <g transform="translate(640, 640)">
    <rect x="0" y="0" width="560" height="40" rx="4" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="25" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="12"><tspan fill="#c9a962" font-weight="600">6.</tspan> 可持续性是必选项：40-45%消费者环保偏好</text>
  </g>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>