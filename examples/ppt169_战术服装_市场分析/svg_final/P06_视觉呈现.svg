<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 60)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="2">CHAPTER 04</text>
  </g>

  <text x="60" y="120" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="36" font-weight="700">产品视觉呈现</text>

  <rect x="60" y="140" width="80" height="3" fill="url(#accentGradient)"/>

  <text x="60" y="180" fill="#86868b" font-family="Inter, sans-serif" font-size="14" max-width="1100">在亚马逊电商语境下，视觉呈现即产品力——从主图规范到A+内容，从色彩体系到摄影美学，每一帧画面都在传递品牌定位</text>

  <text x="60" y="230" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="600">4.1 亚马逊Listing视觉规范</text>

  <text x="60" y="270" fill="#86868b" font-family="Inter, sans-serif" font-size="13">亚马逊的图片规范是所有品牌的"底线要求"，而头部品牌在此基础上发展出差异化的视觉策略。</text>

  <text x="60" y="320" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="600">4.2 色彩体系与品牌调性</text>

  <g transform="translate(60, 350)">
    <rect x="0" y="0" width="540" height="100" rx="6" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="30" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">顶级军规 Tactical</text>
    <text x="20" y="55" fill="#86868b" font-family="Inter, sans-serif" font-size="12">主色调：黑色、卡其色、OD绿 | 辅色调：Coyote Brown、沙色</text>
    <text x="20" y="80" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">设计语言：最低调务实，无logo外露</text>
  </g>

  <g transform="translate(620, 350)">
    <rect x="0" y="0" width="540" height="100" rx="6" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="30" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">户外工装</text>
    <text x="20" y="55" fill="#86868b" font-family="Inter, sans-serif" font-size="12">主色调：棕色、Dark Navy | 辅色调：Hamilton Brown、Lily绿</text>
    <text x="20" y="80" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">设计语言：都市街头化，鲜艳色调 + 做旧</text>
  </g>

  <g transform="translate(60, 470)">
    <rect x="0" y="0" width="540" height="100" rx="6" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="30" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">执法专业</text>
    <text x="20" y="55" fill="#86868b" font-family="Inter, sans-serif" font-size="12">主色调：黑色、Navy Blue | 辅色调：银色反光条</text>
    <text x="20" y="80" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">设计语言：明确功能分区，反光安全标识</text>
  </g>

  <g transform="translate(620, 470)">
    <rect x="0" y="0" width="540" height="100" rx="6" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="30" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">K-Techwear</text>
    <text x="20" y="55" fill="#86868b" font-family="Inter, sans-serif" font-size="12">主色调：黑、灰、橄榄绿 | 辅色调：亮橙（压胶撞色）</text>
    <text x="20" y="80" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">设计语言：机能解构，"将功能通过时装化手段隐藏"</text>
  </g>

  <rect x="60" y="600" width="1160" height="80" rx="8" fill="#1a1a20" stroke="#c9a962" stroke-opacity="0.3"/>
  <text x="80" y="630" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">色彩战略建议</text>
  <text x="80" y="658" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13"><tspan fill="#c9a962" font-weight="600">新手入局建议从中性色调切入</tspan>——黑色、卡其、灰色是亚马逊战术服装的主流色，需求稳定，库存风险低。</text>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>