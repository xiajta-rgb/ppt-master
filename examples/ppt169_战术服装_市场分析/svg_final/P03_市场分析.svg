<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141419"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accentBoxBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(201,169,98,0.08)"/>
      <stop offset="100%" stop-color="rgba(201,169,98,0.03)"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <g transform="translate(640, 80)">
    <text x="0" y="0" text-anchor="middle" fill="#c9a962" font-family="Space Grotesk, Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="4">CHAPTER 01</text>
    <text x="0" y="45" text-anchor="middle" fill="#f5f5f7" font-family="'Space Grotesk', Inter, sans-serif" font-size="36" font-weight="700">市场现状与趋势</text>
    <text x="0" y="80" text-anchor="middle" fill="#86868b" font-family="Inter, sans-serif" font-size="15" max-width="600">全球战术与户外服装市场正经历结构性增长，"城市战术"与Gorpcore风潮推动品类从专业领域向大众消费渗透</text>
  </g>

  <g transform="translate(140, 240)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="240" height="140" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
      <text x="120" y="50" text-anchor="middle" fill="#c9a962" font-family="'Space Grotesk', Inter, sans-serif" font-size="40" font-weight="700">$184<tspan font-size="20">亿</tspan></text>
      <text x="120" y="85" text-anchor="middle" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13" font-weight="500">2025全球市场规模</text>
      <text x="120" y="105" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">战术与户外服装</text>
    </g>
    <g transform="translate(260, 0)">
      <rect x="0" y="0" width="240" height="140" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
      <text x="120" y="50" text-anchor="middle" fill="#c9a962" font-family="'Space Grotesk', Inter, sans-serif" font-size="40" font-weight="700">5.1<tspan font-size="20">%</tspan></text>
      <text x="120" y="85" text-anchor="middle" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13" font-weight="500">年复合增长率</text>
      <text x="120" y="105" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">2025-2033预测</text>
    </g>
    <g transform="translate(520, 0)">
      <rect x="0" y="0" width="240" height="140" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
      <text x="120" y="50" text-anchor="middle" fill="#c9a962" font-family="'Space Grotesk', Inter, sans-serif" font-size="40" font-weight="700">$274<tspan font-size="20">亿</tspan></text>
      <text x="120" y="85" text-anchor="middle" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13" font-weight="500">2033预计规模</text>
      <text x="120" y="105" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">持续稳健增长</text>
    </g>
    <g transform="translate(780, 0)">
      <rect x="0" y="0" width="240" height="140" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
      <text x="120" y="50" text-anchor="middle" fill="#c9a962" font-family="'Space Grotesk', Inter, sans-serif" font-size="40" font-weight="700">50<tspan font-size="20">%+</tspan></text>
      <text x="120" y="85" text-anchor="middle" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13" font-weight="500">线上销售占比</text>
      <text x="120" y="105" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">电商渠道主导</text>
    </g>
  </g>

  <g transform="translate(140, 420)">
    <rect x="0" y="0" width="1000" height="180" rx="16" fill="url(#accentBoxBg)" stroke="rgba(201,169,98,0.3)"/>
    <text x="40" y="35" fill="#c9a962" font-family="'Space Grotesk', Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="2">KEY INSIGHTS</text>
    <text x="40" y="70" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="14"><tspan font-weight="600">户外活动参与度增长40%</tspan> — 徒步、露营、狩猎等户外休闲活动持续升温</text>
    <text x="40" y="100" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="14"><tspan font-weight="600">城市战术时尚需求增长45%</tspan> — 军旅风格从专业领域渗透到日常消费</text>
    <text x="40" y="130" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="14"><tspan font-weight="600">面料科技需求增长30%</tspan> — 吸湿排汗、防火等功能性面料成为消费者核心诉求</text>
    <text x="40" y="160" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="14"><tspan font-weight="600">环保偏好增长45%</tspan> — 再生聚酯、有机棉等可持续材料成为购买决策关键</text>
  </g>

  <text x="640" y="680" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="12">03</text>
</svg>