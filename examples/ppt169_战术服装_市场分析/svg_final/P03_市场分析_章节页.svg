<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 60)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="2">CHAPTER 01</text>
  </g>

  <text x="60" y="120" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="36" font-weight="700">市场现状与趋势</text>

  <rect x="60" y="140" width="80" height="3" fill="url(#accentGradient)"/>

  <text x="60" y="180" fill="#86868b" font-family="Inter, sans-serif" font-size="14" max-width="1100">全球战术与户外服装市场正经历结构性增长，"城市战术"与Gorpcore风潮推动品类从专业领域向大众消费渗透</text>

  <g transform="translate(60, 220)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="40" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="32" font-weight="700">$184<tspan font-size="16">亿</tspan></text>
    <text x="20" y="70" fill="#86868b" font-family="Inter, sans-serif" font-size="12">2025年全球市场规模</text>
    <text x="20" y="95" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">战术与户外服装</text>
  </g>

  <g transform="translate(340, 220)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="40" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="32" font-weight="700">5.1<tspan font-size="16">%</tspan></text>
    <text x="20" y="70" fill="#86868b" font-family="Inter, sans-serif" font-size="12">年复合增长率</text>
    <text x="20" y="95" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">2025-2033预测</text>
  </g>

  <g transform="translate(620, 220)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="40" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="32" font-weight="700">$274<tspan font-size="16">亿</tspan></text>
    <text x="20" y="70" fill="#86868b" font-family="Inter, sans-serif" font-size="12">2033年预计规模</text>
    <text x="20" y="95" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">持续稳健增长</text>
  </g>

  <g transform="translate(900, 220)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="40" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="32" font-weight="700">50<tspan font-size="16">%+</tspan></text>
    <text x="20" y="70" fill="#86868b" font-family="Inter, sans-serif" font-size="12">线上销售占比</text>
    <text x="20" y="95" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">电商渠道主导</text>
  </g>

  <text x="60" y="410" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="18" font-weight="600">关键增长驱动因素</text>

  <g transform="translate(60, 440)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="#c9a962"/>
    <text x="30" y="14" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13">户外活动参与度增长 <tspan fill="#c9a962" font-weight="600">40%</tspan> — 徒步、露营、狩猎等户外休闲活动持续升温</text>
  </g>

  <g transform="translate(60, 475)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="#c9a962"/>
    <text x="30" y="14" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13">城市战术时尚需求增长 <tspan fill="#c9a962" font-weight="600">45%</tspan> — 军旅风格从专业领域渗透到日常消费</text>
  </g>

  <g transform="translate(60, 510)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="#c9a962"/>
    <text x="30" y="14" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13">面料科技需求增长 <tspan fill="#c9a962" font-weight="600">30%</tspan> — 吸湿排汗、防火、防撕裂等功能性面料成为核心诉求</text>
  </g>

  <g transform="translate(60, 545)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="#c9a962"/>
    <text x="30" y="14" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13">环保偏好增长 <tspan fill="#c9a962" font-weight="600">45%</tspan> — 再生聚酯、有机棉等可持续材料成为购买决策关键因素</text>
  </g>

  <rect x="60" y="600" width="1160" height="80" rx="8" fill="#1a1a20" stroke="#c9a962" stroke-opacity="0.3"/>
  <text x="80" y="630" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">核心洞察</text>
  <text x="80" y="658" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13">"城市战术"(Urban Tactical) 是最大增量市场——这批用户不需要专业装备的专业性能，但对其"看起来专业"的设计语言有强烈偏好。品牌入局的最佳切入点。</text>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>