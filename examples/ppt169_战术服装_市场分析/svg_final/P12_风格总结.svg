  <rect x="60" y="475" width="1160" height="70" rx="8" fill="rgba(201,169,98,0.08)" stroke="rgba(201,169,98,0.3)"/>
  <text x="80" y="505" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">核心结论</text>
  <text x="80" y="525" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="12">四大风格代表了工装文化的多元化演进路径：从历史复刻到军事功能，从科技赋能到都市融合，覆盖从专业到日常的全场景需求</text>

  <!-- 图片位置 -->
  <rect x="60" y="560" width="1160" height="130" rx="8" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
  <text x="640" y="630" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="12">[ 四大风格对比图 / 市场趋势图 ]</text>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>