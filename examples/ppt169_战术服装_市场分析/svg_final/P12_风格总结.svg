      <text x="240" y="20" fill="#86868b" font-family="Inter, sans-serif" font-size="11">军事背景演变</text>
      <text x="240" y="38" fill="#6e6e73" font-family="Inter, sans-serif" font-size="9">功能性强</text>
      <text x="480" y="20" fill="#86868b" font-family="Inter, sans-serif" font-size="10">迷彩 · 战术口袋</text>
      <text x="480" y="38" fill="#86868b" font-family="Inter, sans-serif" font-size="10">硬朗剪裁</text>
      <text x="720" y="20" fill="#86868b" font-family="Inter, sans-serif" font-size="10">现代功能转化 · 符号化重构</text>
      <text x="720" y="38" fill="#86868b" font-family="Inter, sans-serif" font-size="10">平衡户外与日常</text>
      <rect x="980" y="5" width="160" height="50" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="3,2"/>
      <text x="1060" y="35" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="9">[ 产品图 ]</text>
    </g>

    <rect x="0" y="175" width="1160" height="1" fill="#2a2a35"/>

    <g transform="translate(0, 183)">
      <text x="40" y="20" fill="#3498db" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700">机能工装风</text>
      <text x="40" y="38" fill="#6e6e73" font-family="Inter, sans-serif" font-size="9">Techwear</text>
      <text x="240" y="20" fill="#86868b" font-family="Inter, sans-serif" font-size="11">多模块化设计</text>
      <text x="240" y="38" fill="#6e6e73" font-family="Inter, sans-serif" font-size="9">科技感强</text>
      <text x="480" y="20" fill="#86868b" font-family="Inter, sans-serif" font-size="10">GORE-TEX · 3M反光</text>
      <text x="480" y="38" fill="#86868b" font-family="Inter, sans-serif" font-size="10">模块化设计</text>
      <text x="720" y="20" fill="#86868b" font-family="Inter, sans-serif" font-size="10">场景化拓展 · 科技赋能</text>
      <text x="720" y="38" fill="#86868b" font-family="Inter, sans-serif" font-size="10">用户共创</text>
      <rect x="980" y="5" width="160" height="50" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="3,2"/>
      <text x="1060" y="35" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="9">[ 产品图 ]</text>
    </g>

    <rect x="0" y="240" width="1160" height="1" fill="#2a2a35"/>

    <g transform="translate(0, 248)">
      <text x="40" y="20" fill="#c47040" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700">轻工装风</text>
      <text x="40" y="38" fill="#6e6e73" font-family="Inter, sans-serif" font-size="9">Light Workwear</text>
      <text x="240" y="20" fill="#86868b" font-family="Inter, sans-serif" font-size="11">现代化融合</text>
      <text x="240" y="38" fill="#6e6e73" font-family="Inter, sans-serif" font-size="9">都市化程度高</text>
      <text x="480" y="20" fill="#86868b" font-family="Inter, sans-serif" font-size="10">简化功能 · 多场景</text>
      <text x="480" y="38" fill="#86868b" font-family="Inter, sans-serif" font-size="10">多元面料</text>
      <text x="720" y="20" fill="#86868b" font-family="Inter, sans-serif" font-size="10">贴合青年审美</text>
      <text x="720" y="38" fill="#86868b" font-family="Inter, sans-serif" font-size="10">场景化营销</text>
      <rect x="980" y="5" width="160" height="50" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="3,2"/>
      <text x="1060" y="35" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="9">[ 产品图 ]</text>
