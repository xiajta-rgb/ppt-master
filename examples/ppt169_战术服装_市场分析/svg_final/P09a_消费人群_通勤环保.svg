<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 40)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">CHAPTER 03</text>
  </g>
  <text x="60" y="85" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="32" font-weight="700">消费者洞察 · 四类人群画像</text>
  <rect x="60" y="100" width="80" height="3" fill="url(#accentGradient)"/>
  <text x="60" y="125" fill="#86868b" font-family="Inter, sans-serif" font-size="13">从职场通勤族到环保理念者，差异化需求驱动产品策略</text>

  <g transform="translate(60, 155)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="550" height="550" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="550" height="6" fill="#c9a962"/>
      <text x="20" y="35" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">03 职场通勤族</text>
      <text x="20" y="60" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">28-40岁+ · 都市白领/新中产</text>
      <text x="20" y="85" fill="#86868b" font-family="Inter, sans-serif" font-size="11">消费动机：商务休闲、多场景适配</text>
      <text x="20" y="110" fill="#86868b" font-family="Inter, sans-serif" font-size="11">价格区间：<tspan fill="#c9a962" font-weight="600">800-2000元</tspan></text>
      <text x="20" y="135" fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600">策略：轻量化产品线 + O2O体验</text>
      <rect x="20" y="150" width="510" height="385" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="275" y="355" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 职场通勤穿搭图 3:4竖版 ]</text>
    </g>

    <g transform="translate(570, 0)">
      <rect x="0" y="0" width="550" height="550" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="550" height="6" fill="#6b7c5e"/>
      <text x="20" y="35" fill="#6b7c5e" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">04 环保理念者</text>
      <text x="20" y="60" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">22-50岁+ · 环保主义者</text>
      <text x="20" y="85" fill="#86868b" font-family="Inter, sans-serif" font-size="11">消费动机：可持续价值观驱动</text>
      <text x="20" y="110" fill="#86868b" font-family="Inter, sans-serif" font-size="11">价格区间：<tspan fill="#c9a962" font-weight="600">1000-3000元</tspan></text>
      <text x="20" y="135" fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600">策略：品牌叙事 + 供应链透明</text>
      <rect x="20" y="150" width="510" height="385" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="275" y="355" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 环保产品图 3:4竖版 ]</text>
    </g>
  </g>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>