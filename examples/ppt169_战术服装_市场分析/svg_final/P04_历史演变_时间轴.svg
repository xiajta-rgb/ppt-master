<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 40)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">CHAPTER 02</text>
  </g>
  <text x="60" y="85" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="32" font-weight="700">分阶段历史演变</text>
  <rect x="60" y="100" width="80" height="3" fill="url(#accentGradient)"/>
  <text x="60" y="125" fill="#86868b" font-family="Inter, sans-serif" font-size="13">追溯工装文化的历史起源与演变脉络</text>

  <g transform="translate(60, 155)">
    <rect x="0" y="0" width="560" height="540" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
    <rect x="0" y="0" width="560" height="6" fill="#c9a962"/>

    <rect x="20" y="20" width="2" height="500" fill="#c9a962" opacity="0.3"/>

    <circle cx="21" cy="50" r="12" fill="#c9a962"/>
    <text x="21" y="55" text-anchor="middle" fill="#0a0a0f" font-family="Inter, sans-serif" font-size="12" font-weight="700">1</text>
    <text x="50" y="45" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">18-19世纪 · 工业革命</text>
    <text x="50" y="70" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700">工装诞生</text>
    <text x="50" y="95" fill="#86868b" font-family="Inter, sans-serif" font-size="12">以耐磨、实用、防护为核心</text>
    <text x="50" y="115" fill="#86868b" font-family="Inter, sans-serif" font-size="12">采用厚实棉布/帆布</text>
    <rect x="50" y="130" width="490" height="280" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
    <text x="295" y="280" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="12">[ 早期工装图片 3:4 ]</text>

    <circle cx="21" cy="430" r="12" fill="#c9a962"/>
    <text x="21" y="435" text-anchor="middle" fill="#0a0a0f" font-family="Inter, sans-serif" font-size="12" font-weight="700">2</text>
    <text x="50" y="425" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">20世纪初 — 二战</text>
    <text x="50" y="450" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700">军事化与阶级象征</text>
    <text x="50" y="475" fill="#86868b" font-family="Inter, sans-serif" font-size="12">受军事影响，成为工人阶级象征</text>
    <text x="50" y="495" fill="#86868b" font-family="Inter, sans-serif" font-size="12">二战被军队采用，战后流入民间</text>
  </g>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>
