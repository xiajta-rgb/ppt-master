<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 40)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">CHAPTER 02</text>
  </g>
  <text x="60" y="85" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="32" font-weight="700">分阶段历史演变</text>
  <rect x="60" y="100" width="80" height="3" fill="url(#accentGradient)"/>
  <text x="60" y="125" fill="#86868b" font-family="Inter, sans-serif" font-size="13">追溯工装文化的历史起源与演变脉络</text>

  <line x1="60" y1="160" x2="1220" y2="160" stroke="#c9a962" stroke-width="2" stroke-dasharray="8,4"/>

  <g transform="translate(60, 185)">
    <g transform="translate(0, 0)">
      <circle cx="40" cy="30" r="20" fill="#c9a962"/>
      <text x="40" y="36" text-anchor="middle" fill="#0a0a0f" font-family="Inter, sans-serif" font-size="14" font-weight="700">1</text>
      <text x="40" y="70" text-anchor="middle" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">18-19世纪</text>
      <text x="40" y="92" text-anchor="middle" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">工业革命</text>
      <text x="40" y="112" text-anchor="middle" fill="#86868b" font-family="Inter, sans-serif" font-size="10">工装诞生</text>
      <rect x="0" y="130" width="280" height="380" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="130" width="280" height="6" fill="#c9a962"/>
      <rect x="10" y="150" width="260" height="340" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="140" y="330" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 早期工装图片 3:4 ]</text>
      <text x="140" y="360" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">280×340</text>
    </g>

    <g transform="translate(310, 0)">
      <circle cx="40" cy="30" r="20" fill="#c9a962"/>
      <text x="40" y="36" text-anchor="middle" fill="#0a0a0f" font-family="Inter, sans-serif" font-size="14" font-weight="700">2</text>
      <text x="40" y="70" text-anchor="middle" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">20世纪初</text>
      <text x="40" y="92" text-anchor="middle" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">军事化</text>
      <text x="40" y="112" text-anchor="middle" fill="#86868b" font-family="Inter, sans-serif" font-size="10">阶级象征</text>
      <rect x="0" y="130" width="280" height="380" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="130" width="280" height="6" fill="#c9a962"/>
      <rect x="10" y="150" width="260" height="340" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="140" y="330" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 军事工装图片 3:4 ]</text>
      <text x="140" y="360" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">280×340</text>
    </g>

    <g transform="translate(620, 0)">
      <circle cx="40" cy="30" r="20" fill="#c9a962"/>
      <text x="40" y="36" text-anchor="middle" fill="#0a0a0f" font-family="Inter, sans-serif" font-size="14" font-weight="700">3</text>
      <text x="40" y="70" text-anchor="middle" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">1950-1980s</text>
      <text x="40" y="92" text-anchor="middle" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">工装复兴</text>
      <text x="40" y="112" text-anchor="middle" fill="#86868b" font-family="Inter, sans-serif" font-size="10">街头文化</text>
      <rect x="0" y="130" width="280" height="380" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="130" width="280" height="6" fill="#c9a962"/>
      <rect x="10" y="150" width="260" height="340" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="140" y="330" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 工装复兴图片 3:4 ]</text>
      <text x="140" y="360" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">280×340</text>
    </g>

    <g transform="translate(930, 0)">
      <circle cx="40" cy="30" r="20" fill="#c9a962"/>
      <text x="40" y="36" text-anchor="middle" fill="#0a0a0f" font-family="Inter, sans-serif" font-size="14" font-weight="700">4</text>
      <text x="40" y="70" text-anchor="middle" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">1990s至今</text>
      <text x="40" y="92" text-anchor="middle" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">战术潮流</text>
      <text x="40" y="112" text-anchor="middle" fill="#86868b" font-family="Inter, sans-serif" font-size="10">当代演绎</text>
      <rect x="0" y="130" width="280" height="380" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="130" width="280" height="6" fill="#c9a962"/>
      <rect x="10" y="150" width="260" height="340" rx="4" fill="#252530" stroke="#3a3a45"/>
      <text x="140" y="330" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 当代战术图片 3:4 ]</text>
      <text x="140" y="360" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">280×340</text>
    </g>
  </g>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>