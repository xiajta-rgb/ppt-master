<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 40)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">CHAPTER 06</text>
  </g>
  <text x="60" y="85" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="32" font-weight="700">未来机遇与战略建议</text>
  <rect x="60" y="100" width="80" height="3" fill="url(#accentGradient)"/>
  <text x="60" y="125" fill="#86868b" font-family="Inter, sans-serif" font-size="13">为品牌入局或升级提供可执行的战略方向</text>

  <text x="60" y="165" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">市场进入建议</text>

  <g transform="translate(60, 200)">
    <rect x="0" y="0" width="540" height="500" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
    <rect x="0" y="0" width="6" height="500" fill="#c9a962"/>
    <text x="20" y="30" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">1. 从中端切入</text>
    <text x="20" y="55" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="11">$45-75价格带是最佳起点，有足够利润空间进行品牌建设</text>
    <text x="20" y="80" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">2. 城市战术是最大增量</text>
    <text x="20" y="105" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="11">45%的城市战术需求增长表明军旅风格已从专业领域渗透到日常消费</text>
    <text x="20" y="130" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">3. Gorpcore是结构性转变</text>
    <text x="20" y="155" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="11">Arc'teryx 20亿美元+、Salomon 10亿美元鞋类销售</text>
    <rect x="20" y="175" width="500" height="310" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
    <text x="270" y="340" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ Gorpcore风格示意 3:4竖版 ]</text>
  </g>

  <g transform="translate(620, 200)">
    <rect x="0" y="0" width="540" height="500" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
    <rect x="0" y="0" width="6" height="500" fill="#c9a962"/>
    <text x="20" y="30" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">4. 亚马逊是核心战场</text>
    <text x="20" y="55" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="11">线上销售占比超50%，A+内容可提升20%销售额</text>
    <text x="20" y="80" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">5. 功能与时尚融合加速</text>
    <text x="20" y="105" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="11">技术面料不再仅服务于专业场景</text>
    <text x="20" y="130" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">6. 可持续性是必选项</text>
    <text x="20" y="155" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="11">40-45%消费者环保偏好</text>
    <rect x="20" y="175" width="500" height="310" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
    <text x="270" y="340" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 环保产品展示 3:4竖版 ]</text>
  </g>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>