<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 60)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="2">CHAPTER 02</text>
  </g>

  <text x="60" y="120" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="36" font-weight="700">核心产品设计DNA</text>

  <rect x="60" y="140" width="80" height="3" fill="url(#accentGradient)"/>

  <text x="60" y="180" fill="#86868b" font-family="Inter, sans-serif" font-size="14" max-width="1100">面料科技、版型工学与功能细节构成了战术服装的产品力三角——每一处设计决策都服务于"耐用性、功能性、舒适性"的核心诉求</text>

  <text x="60" y="230" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="600">2.1 面料科技</text>

  <g transform="translate(60, 260)">
    <rect x="0" y="0" width="360" height="80" rx="6" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="30" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">Cordura 尼龙</text>
    <text x="20" y="55" fill="#86868b" font-family="Inter, sans-serif" font-size="12">卓越耐磨性，比标准尼龙高10倍 | 高强度战术裤、背包</text>
  </g>

  <g transform="translate(440, 260)">
    <rect x="0" y="0" width="360" height="80" rx="6" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="30" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">Ripstop 防撕裂</text>
    <text x="20" y="55" fill="#86868b" font-family="Inter, sans-serif" font-size="12">菱形网格结构，轻量抗撕裂 | 常规战术裤、户外服装</text>
  </g>

  <g transform="translate(820, 260)">
    <rect x="0" y="0" width="360" height="80" rx="6" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="30" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">DWR 持久防泼水</text>
    <text x="20" y="55" fill="#86868b" font-family="Inter, sans-serif" font-size="12">水珠在面料表面滑落，不浸透 | 中高端战术裤标配</text>
  </g>

  <text x="60" y="380" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="600">2.2 版型与廓形工学</text>

  <g transform="translate(60, 410)">
    <rect x="0" y="0" width="360" height="100" rx="6" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="30" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">Classic Fit 经典合身</text>
    <text x="20" y="55" fill="#86868b" font-family="Inter, sans-serif" font-size="12">传统工装版型，宽松舒适，适合体力劳动者和年长消费者</text>
  </g>

  <g transform="translate(440, 410)">
    <rect x="0" y="0" width="360" height="100" rx="6" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="30" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">Athletic Fit 运动合身</text>
    <text x="20" y="55" fill="#86868b" font-family="Inter, sans-serif" font-size="12">针对健身人群优化，臀部/腿部收紧，适合标准体型年轻人</text>
  </g>

  <g transform="translate(820, 410)">
    <rect x="0" y="0" width="360" height="100" rx="6" fill="#1a1a20" stroke="#2a2a35"/>
    <text x="20" y="30" fill="#c9a962" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">Slim Fit 修身裁剪</text>
    <text x="20" y="55" fill="#86868b" font-family="Inter, sans-serif" font-size="12">现代都市感，适合城市战术时尚消费者，融合功能与风格</text>
  </g>

  <text x="60" y="550" fill="#f5f5f7" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="600">2.3 功能细节设计</text>

  <g transform="translate(60, 580)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="#c9a962"/>
    <text x="30" y="14" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13">口袋系统 Pocket System（8-14+口袋）— 大腿贴袋、隐藏弹匣/手机口袋、刀片/手电筒插槽</text>
  </g>

  <g transform="translate(60, 610)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="#c9a962"/>
    <text x="30" y="14" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13">通风系统 Ventilation System — 网眼通风口袋内衬、膝盖通风口、拉链通风口</text>
  </g>

  <g transform="translate(60, 640)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="#c9a962"/>
    <text x="30" y="14" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13">腰部工学 Waistband Engineering — 弹力侧腰提供2-3英寸伸缩范围、可调节滑动腰带</text>
  </g>

  <g transform="translate(600, 580)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="#c9a962"/>
    <text x="30" y="14" fill="#f5f5f7" font-family="Inter, sans-serif" font-size="13">加固工艺 Reinforcement — 双线缝合、打枣加固关键受力点、YKK铆钉加固</text>
  </g>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>