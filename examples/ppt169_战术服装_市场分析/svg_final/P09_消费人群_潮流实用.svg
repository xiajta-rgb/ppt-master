<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)"/>

  <g transform="translate(60, 40)">
    <text fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">CHAPTER 03</text>
  </g>
  <text x="60" y="85" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="32" font-weight="700">消费者洞察 · 四类人群画像</text>
  <rect x="60" y="100" width="80" height="3" fill="url(#accentGradient)"/>
  <text x="60" y="125" fill="#86868b" font-family="Inter, sans-serif" font-size="13">从潮流青年到实用主义者，不同人群的差异化需求驱动产品策略</text>

  <g transform="translate(60, 155)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="550" height="550" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="550" height="6" fill="#e74c3c"/>
      <text x="20" y="35" fill="#e74c3c" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">01 潮流青年</text>
      <text x="20" y="60" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">18-30岁 · 学生/职场新人</text>
      <text x="20" y="85" fill="#86868b" font-family="Inter, sans-serif" font-size="11">消费动机：个性表达、社交认同</text>
      <text x="20" y="110" fill="#86868b" font-family="Inter, sans-serif" font-size="11">价格区间：<tspan fill="#c9a962" font-weight="600">500-1200元</tspan></text>
      <text x="20" y="135" fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600">策略：联名营销 + 限量发售</text>
      <rect x="20" y="150" width="510" height="385" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="275" y="355" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 潮流青年穿搭图 3:4竖版 ]</text>
    </g>

    <g transform="translate(570, 0)">
      <rect x="0" y="0" width="550" height="550" rx="8" fill="#1a1a20" stroke="#2a2a35"/>
      <rect x="0" y="0" width="550" height="6" fill="#f39c12"/>
      <text x="20" y="35" fill="#f39c12" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600">02 实用主义者</text>
      <text x="20" y="60" fill="#6e6e73" font-family="Inter, sans-serif" font-size="11">25-45岁+ · 制造业/服务业</text>
      <text x="20" y="85" fill="#86868b" font-family="Inter, sans-serif" font-size="11">消费动机：耐用性、防护性、性价比</text>
      <text x="20" y="110" fill="#86868b" font-family="Inter, sans-serif" font-size="11">价格区间：<tspan fill="#c9a962" font-weight="600">200-500元</tspan></text>
      <text x="20" y="135" fill="#c9a962" font-family="Inter, sans-serif" font-size="11" font-weight="600">策略：供应链降本 + B端渗透</text>
      <rect x="20" y="150" width="510" height="385" rx="4" fill="#252530" stroke="#3a3a45" stroke-dasharray="4,2"/>
      <text x="275" y="355" text-anchor="middle" fill="#6e6e73" font-family="Inter, sans-serif" font-size="14">[ 实用主义产品图 3:4竖版 ]</text>
    </g>
  </g>

  <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)"/>
</svg>