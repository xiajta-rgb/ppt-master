<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <g transform="translate(640, 300)">
    <line x1="-200" y1="0" x2="200" y2="0" stroke="#c9a962" stroke-width="1"/>
  </g>

  <text x="640" y="350" text-anchor="middle" fill="url(#accentGradient)" font-family="Space Grotesk, Inter, sans-serif" font-size="48" font-weight="700">{{THANK_YOU}}</text>

  <text x="640" y="420" text-anchor="middle" fill="#86868b" font-family="Inter, -apple-system, sans-serif" font-size="15">{{REPORT_TITLE}}</text>

  <text x="640" y="480" text-anchor="middle" fill="#6e6e73" font-family="Inter, -apple-system, sans-serif" font-size="13">{{DATA_SOURCES}}</text>

  <text x="640" y="520" text-anchor="middle" fill="#6e6e73" font-family="Inter, -apple-system, sans-serif" font-size="13">{{DATE}} | Internal Research Only</text>
</svg>