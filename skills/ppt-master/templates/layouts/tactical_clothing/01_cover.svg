<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#e0c882"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="50%" cy="-20%" r="80%">
      <stop offset="0%" stop-color="rgba(201,169,98,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <pattern id="gridPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
    </pattern>
    <mask id="gridMask">
      <ellipse cx="640" cy="200" rx="600" ry="300" fill="white"/>
    </mask>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <ellipse cx="640" cy="0" rx="800" ry="500" fill="url(#heroGlow)"/>
  <g mask="url(#gridMask)">
    <rect width="1280" height="720" fill="url(#gridPattern)"/>
  </g>

  <g transform="translate(640, 280)">
    <g fill="none" stroke="rgba(201,169,98,0.3)" stroke-width="1" rx="100" ry="100">
      <rect x="-80" y="-30" width="160" height="60" rx="30"/>
    </g>
    <text x="0" y="5" text-anchor="middle" fill="#c9a962" font-family="Space Grotesk, Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">INDUSTRY RESEARCH · 2025</text>
  </g>

  <text x="640" y="380" text-anchor="middle" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="52" font-weight="700" letter-spacing="-2">
    {{TITLE_LINE1}}
  </text>
  <text x="640" y="450" text-anchor="middle" fill="url(#accentGradient)" font-family="Space Grotesk, Inter, sans-serif" font-size="52" font-weight="700" letter-spacing="-2">
    {{TITLE_LINE2}}
  </text>

  <text x="640" y="520" text-anchor="middle" fill="#86868b" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="400">
    {{SUBTITLE}}
  </text>

  <g transform="translate(640, 600)" fill="#6e6e73" font-family="Inter, -apple-system, sans-serif" font-size="13">
    <text x="0" y="0" text-anchor="middle">
      <tspan dx="-120">{{DATE}}</tspan>
      <tspan dx="60">|</tspan>
      <tspan dx="60">Amazon US Market</tspan>
      <tspan dx="60">|</tspan>
      <tspan dx="60">Market Research Report</tspan>
    </text>
  </g>
</svg>