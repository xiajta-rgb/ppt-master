<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="accentBoxBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(201,169,98,0.08)"/>
      <stop offset="100%" stop-color="rgba(201,169,98,0.03)"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <rect x="48" y="60" width="1184" height="600" fill="none"/>

  <g transform="translate(640, 120)">
    <text x="0" y="0" text-anchor="middle" fill="#c9a962" font-family="Space Grotesk, Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="4">CHAPTER {{CHAPTER_NUM}}</text>
    <text x="0" y="50" text-anchor="middle" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="36" font-weight="700">{{PAGE_TITLE}}</text>
    <text x="0" y="90" text-anchor="middle" fill="#86868b" font-family="Inter, -apple-system, sans-serif" font-size="15" font-weight="400" max-width="600">{{PAGE_DESC}}</text>
  </g>

  <rect x="100" y="280" width="4" height="300" fill="#c9a962"/>

  <text x="130" y="300" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="18" font-weight="600">Section {{SECTION_NUM}}</text>

  <text x="130" y="340" fill="#86868b" font-family="Inter, -apple-system, sans-serif" font-size="14">{{CONTENT_BODY}}</text>

  <rect x="130" y="380" width="400" height="120" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
  <text x="160" y="420" fill="#c9a962" font-family="Space Grotesk, Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">{{HIGHLIGHT_LABEL}}</text>
  <text x="160" y="450" fill="#f5f5f7" font-family="Inter, -apple-system, sans-serif" font-size="14">{{HIGHLIGHT_TEXT}}</text>

  <g transform="translate(640, 620)">
    <text x="0" y="0" text-anchor="middle" fill="#6e6e73" font-family="Inter, -apple-system, sans-serif" font-size="12">{{PAGE_NUM}}</text>
  </g>
</svg>