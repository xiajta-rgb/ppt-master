<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141419"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <text x="640" y="200" text-anchor="middle" fill="rgba(201,169,98,0.4)" font-family="Space Grotesk, Inter, sans-serif" font-size="120" font-weight="700">{{CHAPTER_NUM}}</text>

  <text x="640" y="320" text-anchor="middle" fill="#c9a962" font-family="Space Grotesk, Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="4">CHAPTER {{CHAPTER_NUM}}</text>

  <text x="640" y="390" text-anchor="middle" fill="#f5f5f7" font-family="Space Grotesk, Inter, sans-serif" font-size="48" font-weight="700" letter-spacing="-1">{{CHAPTER_TITLE}}</text>

  <text x="640" y="460" text-anchor="middle" fill="#86868b" font-family="Inter, -apple-system, sans-serif" font-size="17" font-weight="400" max-width="600">{{CHAPTER_DESC}}</text>
</svg>