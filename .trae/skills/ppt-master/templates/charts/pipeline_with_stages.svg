  <text x="838" y="322" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#566573">画像 · 意图 · 归因</text>

  <rect x="824" y="344" width="6" height="6" fill="#5B9BD5"/>
  <text x="838" y="352" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#1A252F">知识图谱补充</text>
  <text x="838" y="370" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#566573">实体关联 · 关系扩展</text>

  <rect x="824" y="392" width="6" height="6" fill="#5B9BD5"/>
  <text x="838" y="400" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#1A252F">语义标签落地</text>
  <text x="838" y="418" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#566573">可被业务直接消费</text>

  <rect x="824" y="460" width="162" height="82" fill="#F7F9FC"/>
  <text x="905" y="478" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7F8C8D">产物 · Output</text>
  <line x1="838" y1="486" x2="972" y2="486" stroke="#E7E6E6" stroke-width="1"/>
  <text x="905" y="510" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#5B9BD5">Enriched Set</text>
  <text x="905" y="530" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7F8C8D">增强数据集</text>

