<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!--
  数据/处理管道图模板 (Pipeline with Stages)
  用途: 水平依次经过的多个阶段，每个阶段承载标题 + 描述 + 输入输出
  适用场景: 数据管道、ETL 流程、编译/构建流水线、审批流
  支持: 3-5 阶段 (推荐 4-5)
  关键约定:
    - 每个阶段卡 = 编号徽章 + 阶段标题 + 职责定位 + 2 条要点描述 + 产物 / Output
    - 阶段间用手绘三角箭头 (非 marker) 展示单向流动
    - 左侧行标签 "流水阶段" 统一框住全部阶段
    - 底部"产物流向"带用两个强调色块标出起点与终点
    - 若阶段缺少"产物"或缺少描述，应退回 process_flow 或 numbered_steps
  注意: 中文字符实际渲染宽度约 1em，卡片内文本按每卡 ≤ 12 个字符估算，超过请精简表达
  -->

  <!-- 背景 -->
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <!-- 标题 -->
  <rect x="30" y="22" width="10" height="40" fill="#C00000"/>
  <text x="52" y="55" font-family="Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#C00000">数据处理管道全流程</text>

  <!-- 副标题带 -->
  <rect x="30" y="78" width="1220" height="46" fill="#F2F2F2"/>
  <text x="640" y="99" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#1A252F">
    <tspan x="640" dy="0">从原始数据到业务产出的五阶段流水 · 每阶段的产物即下一阶段的输入</tspan>
    <tspan x="640" dy="22" fill="#7F8C8D" font-weight="400">阶段卡 = 编号 + 标题 + 职责定位 + 要点描述 + 产物；缺产物或缺描述请改用 process_flow 或 numbered_steps</tspan>
  </text>

  <!-- ==================== 左侧行标签 ==================== -->
  <rect x="30" y="150" width="30" height="30" fill="#C00000"/>
  <text x="45" y="172" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">⟶</text>
  <text x="32" y="220" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#1A252F">流水</text>
  <text x="32" y="246" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#1A252F">阶段</text>
  <text x="32" y="272" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7F8C8D">Pipeline</text>
  <text x="32" y="288" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#7F8C8D">Stages</text>

  <!-- ==================== 流水线整体外框 ==================== -->
  <rect x="100" y="150" width="1150" height="430" fill="none" stroke="#C00000" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="100" y="150" width="1150" height="32" fill="#FDF3EB"/>
  <text x="675" y="172" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="700" fill="#1A252F">五阶段串行流水 · Raw → Clean → Wide → Enriched → Products</text>

  <!--
  阶段卡布局计算:
    可用宽: 1150 - 2*20 (内边距) = 1110
    5 卡 + 4 箭头区, 每箭头区 40, 每卡 (1110 - 4*40) / 5 = 190
    卡 x: 120, 350, 580, 810, 1040 (间距 230 = 卡 190 + 箭头区 40)
    卡 y: 200 - 560, 高 360
  -->

  <!-- ==================== 阶段 1: 采集 ==================== -->
  <rect x="120" y="200" width="190" height="360" fill="#FFFFFF" stroke="#2E75B6" stroke-width="1"/>
  <rect x="120" y="200" width="190" height="48" fill="#2E75B6"/>
  <rect x="132" y="210" width="28" height="28" fill="#FFFFFF"/>
  <text x="146" y="230" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#2E75B6">01</text>
  <text x="172" y="230" font-family="Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">采集</text>
  <text x="172" y="244" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.85">Ingest</text>

  <rect x="120" y="248" width="190" height="30" fill="#EAF1F8"/>
  <text x="215" y="268" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#2E75B6">多源接入与实时抓取</text>

  <rect x="134" y="296" width="6" height="6" fill="#2E75B6"/>
  <text x="148" y="304" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#1A252F">多通道接入</text>
  <text x="148" y="322" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#566573">埋点 · CDC · 文件同步</text>

  <rect x="134" y="344" width="6" height="6" fill="#2E75B6"/>
  <text x="148" y="352" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#1A252F">统一协议</text>
  <text x="148" y="370" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#566573">队列缓冲 · 背压控制</text>

  <rect x="134" y="392" width="6" height="6" fill="#2E75B6"/>
  <text x="148" y="400" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#1A252F">弹性吞吐</text>
  <text x="148" y="418" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#566573">分片并行 · 自动扩缩</text>

  <rect x="134" y="460" width="162" height="82" fill="#F7F9FC"/>
  <text x="215" y="478" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7F8C8D">产物 · Output</text>
  <line x1="148" y1="486" x2="282" y2="486" stroke="#E7E6E6" stroke-width="1"/>
  <text x="215" y="510" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#2E75B6">Raw Events</text>
  <text x="215" y="530" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7F8C8D">原始事件流</text>

  <!-- ==================== 阶段 2: 校验 ==================== -->
  <rect x="350" y="200" width="190" height="360" fill="#FFFFFF" stroke="#2E75B6" stroke-width="1"/>
  <rect x="350" y="200" width="190" height="48" fill="#2E75B6"/>
  <rect x="362" y="210" width="28" height="28" fill="#FFFFFF"/>
  <text x="376" y="230" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#2E75B6">02</text>
  <text x="402" y="230" font-family="Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">校验</text>
  <text x="402" y="244" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.85">Validate</text>

  <rect x="350" y="248" width="190" height="30" fill="#EAF1F8"/>
  <text x="445" y="268" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#2E75B6">规则校验与脏数据隔离</text>

  <rect x="364" y="296" width="6" height="6" fill="#2E75B6"/>
  <text x="378" y="304" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#1A252F">格式与范围校验</text>
  <text x="378" y="322" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#566573">字段类型 · 取值域</text>

  <rect x="364" y="344" width="6" height="6" fill="#2E75B6"/>
  <text x="378" y="352" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#1A252F">业务规则校验</text>
  <text x="378" y="370" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#566573">唯一性 · 引用完整性</text>

  <rect x="364" y="392" width="6" height="6" fill="#2E75B6"/>
  <text x="378" y="400" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#1A252F">异常隔离告警</text>
  <text x="378" y="418" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#566573">死信队列 · 触发重试</text>

  <rect x="364" y="460" width="162" height="82" fill="#F7F9FC"/>
  <text x="445" y="478" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7F8C8D">产物 · Output</text>
  <line x1="378" y1="486" x2="512" y2="486" stroke="#E7E6E6" stroke-width="1"/>
  <text x="445" y="510" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#2E75B6">Clean Events</text>
  <text x="445" y="530" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7F8C8D">合规事件流</text>

  <!-- ==================== 阶段 3: 转换 ==================== -->
  <rect x="580" y="200" width="190" height="360" fill="#FFFFFF" stroke="#C00000" stroke-width="1"/>
  <rect x="580" y="200" width="190" height="48" fill="#C00000"/>
  <rect x="592" y="210" width="28" height="28" fill="#FFFFFF"/>
  <text x="606" y="230" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#C00000">03</text>
  <text x="632" y="230" font-family="Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">转换</text>
  <text x="632" y="244" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.85">Transform</text>

  <rect x="580" y="248" width="190" height="30" fill="#FDF3EB"/>
  <text x="675" y="268" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#C00000">结构化与口径对齐</text>

  <rect x="594" y="296" width="6" height="6" fill="#C00000"/>
  <text x="608" y="304" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#1A252F">反规范化建模</text>
  <text x="608" y="322" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#566573">维度补齐 · 粒度聚合</text>

  <rect x="594" y="344" width="6" height="6" fill="#C00000"/>
  <text x="608" y="352" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#1A252F">派生指标计算</text>
  <text x="608" y="370" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#566573">统一指标口径</text>

  <rect x="594" y="392" width="6" height="6" fill="#C00000"/>
  <text x="608" y="400" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#1A252F">主题宽表产出</text>
  <text x="608" y="418" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#566573">可复用 · 可下钻</text>

  <rect x="594" y="460" width="162" height="82" fill="#F7F9FC"/>
  <text x="675" y="478" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#7F8C8D">产物 · Output</text>
  <line x1="608" y1="486" x2="742" y2="486" stroke="#E7E6E6" stroke-width="1"/>
  <text x="675" y="510" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#C00000">Wide Tables</text>
  <text x="675" y="530" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7F8C8D">主题宽表</text>

  <!-- ==================== 阶段 4: 增强 ==================== -->
  <rect x="810" y="200" width="190" height="360" fill="#FFFFFF" stroke="#5B9BD5" stroke-width="1"/>
  <rect x="810" y="200" width="190" height="48" fill="#5B9BD5"/>
  <rect x="822" y="210" width="28" height="28" fill="#FFFFFF"/>
  <text x="836" y="230" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#5B9BD5">04</text>
  <text x="862" y="230" font-family="Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">增强</text>
  <text x="862" y="244" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.85">Enrich</text>

  <rect x="810" y="248" width="190" height="30" fill="#E9F2FA"/>
  <text x="905" y="268" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#5B9BD5">AI 标签与语义注入</text>

  <rect x="824" y="296" width="6" height="6" fill="#5B9BD5"/>
