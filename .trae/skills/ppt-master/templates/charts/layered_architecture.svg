  <text x="864" y="372" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#1A252F">消息队列</text>
  <line x1="830" y1="388" x2="1030" y2="388" stroke="#E7E6E6" stroke-width="1"/>
  <text x="830" y="406" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#566573">异步解耦 · 事件驱动</text>
  <text x="830" y="420" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7F8C8D">Kafka · RocketMQ</text>

