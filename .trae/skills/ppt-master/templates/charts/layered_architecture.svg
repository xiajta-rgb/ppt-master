<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!--
  分层架构图模板 (Layered Architecture)
  用途: 系统/软件分层架构展示 (应用-服务-数据 / 前端-业务-基础设施)
  适用场景: 技术架构概览、分层职责划分、纵向依赖关系、中台总体视图
  支持: 3 层主干 + 左侧行标签 + 右侧能力出口列 + 底部基础支撑带
  关键约定:
    - 每个模块卡 = 模块标题 + 1 行能力描述；两段文本必须同时填写
    - 左侧行标签给每一层起名（应用层/服务层/数据层）
    - 红色编号徽章标注每一层的序号
    - 右侧"能力输出"列承载跨层对外输出或开放能力
    - 底部"基础支撑"带承载底层共用能力 (日志/监控/权限等)
  -->

  <!-- 背景 -->
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <!-- 标题 -->
  <rect x="30" y="22" width="10" height="40" fill="#C00000"/>
  <text x="52" y="55" font-family="Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#C00000">系统分层总体架构视图</text>

  <!-- 副标题带 -->
  <rect x="30" y="78" width="1220" height="46" fill="#F2F2F2"/>
  <text x="640" y="99" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#1A252F">
    <tspan x="640" dy="0">自上而下三层能力栈 + 右侧统一能力出口 + 底部共用支撑，上层依赖下层，跨层通过标准契约通信</tspan>
    <tspan x="640" dy="22" fill="#7F8C8D" font-weight="400">每个模块卡 = 模块标题 + 1 行能力描述；缺任一段即退回 icon_grid 或 numbered_steps</tspan>
  </text>

  <!-- ==================== 层 1: 应用层 ==================== -->
  <!-- 左侧行标签 + 编号 -->
  <rect x="30" y="150" width="30" height="30" fill="#C00000"/>
  <text x="45" y="172" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">1</text>
  <text x="32" y="218" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#1A252F">应用</text>
  <text x="32" y="244" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#1A252F">层</text>

  <!-- 主内容区 (左 x=100, 右 x=1050) -->
  <rect x="100" y="150" width="950" height="140" fill="none" stroke="#2E75B6" stroke-width="1.5" stroke-dasharray="5 5"/>
  <rect x="100" y="150" width="950" height="28" fill="#EAF1F8"/>
  <text x="575" y="169" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="700" fill="#2E75B6">面向终端用户与第三方的访问入口 · Presentation</text>

  <!-- 模块卡 1.1 -->
  <rect x="118" y="192" width="220" height="82" fill="#FFFFFF" stroke="#C9D8E9" stroke-width="1"/>
  <rect x="118" y="192" width="220" height="4" fill="#2E75B6"/>
  <rect x="128" y="204" width="26" height="26" fill="#5B9BD5"/>
  <text x="141" y="222" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">W</text>
  <text x="162" y="222" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#1A252F">Web 控制台</text>
  <line x1="128" y1="238" x2="328" y2="238" stroke="#E7E6E6" stroke-width="1"/>
  <text x="128" y="256" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#566573">React SPA · 管理与可视化界面</text>
  <text x="128" y="270" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7F8C8D">HTTPS / WebSocket</text>

  <!-- 模块卡 1.2 -->
  <rect x="352" y="192" width="220" height="82" fill="#FFFFFF" stroke="#C9D8E9" stroke-width="1"/>
  <rect x="352" y="192" width="220" height="4" fill="#2E75B6"/>
  <rect x="362" y="204" width="26" height="26" fill="#5B9BD5"/>
  <text x="375" y="222" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">M</text>
  <text x="396" y="222" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#1A252F">移动端 App</text>
  <line x1="362" y1="238" x2="562" y2="238" stroke="#E7E6E6" stroke-width="1"/>
  <text x="362" y="256" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#566573">iOS / Android 原生客户端</text>
  <text x="362" y="270" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7F8C8D">HTTP/2 · 支持离线缓存</text>

  <!-- 模块卡 1.3 -->
  <rect x="586" y="192" width="220" height="82" fill="#FFFFFF" stroke="#C9D8E9" stroke-width="1"/>
  <rect x="586" y="192" width="220" height="4" fill="#2E75B6"/>
  <rect x="596" y="204" width="26" height="26" fill="#5B9BD5"/>
  <text x="609" y="222" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">A</text>
  <text x="630" y="222" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#1A252F">开放 API</text>
  <line x1="596" y1="238" x2="796" y2="238" stroke="#E7E6E6" stroke-width="1"/>
  <text x="596" y="256" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#566573">REST / GraphQL · 对外集成</text>
  <text x="596" y="270" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7F8C8D">OAuth2 · API Key</text>

  <!-- 模块卡 1.4 -->
  <rect x="820" y="192" width="220" height="82" fill="#FFFFFF" stroke="#C9D8E9" stroke-width="1"/>
  <rect x="820" y="192" width="220" height="4" fill="#2E75B6"/>
  <rect x="830" y="204" width="26" height="26" fill="#5B9BD5"/>
  <text x="843" y="222" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">C</text>
  <text x="864" y="222" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#1A252F">CLI 工具</text>
  <line x1="830" y1="238" x2="1030" y2="238" stroke="#E7E6E6" stroke-width="1"/>
  <text x="830" y="256" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#566573">命令行与自动化脚本入口</text>
  <text x="830" y="270" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#7F8C8D">面向 DevOps 与 CI/CD</text>

